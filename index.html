  function KCSec({sec,sRef,onDone,setLog}){
    const[ch,setCh]=useState(null);
    const[wrong,setWrong]=useState(false);
    const done=useRef(false);
    const pick=id=>{
      if(ch!=null)return;setCh(id);
      const ok=id===sec.cor;
      setLog(p=>({...p,answersLog:[...p.answersLog,{sec:sec.id,answer:id,correct:ok}]}));
      if(ok){
        if(!done.current){done.current=true;onDone();}
      } else {
        setWrong(true);
        setTimeout(()=>setCh(null),1400);
      }
    };
    const Beam=({a})=>{
      const cos=Math.cos(a),sin=Math.sin(a),vert=Math.abs(Math.abs(a)-Math.PI/2)<.1;
      const ox=12,oy=55,ex=vert?ox:Math.min(82,Math.max(10,ox+cos*65)),ey=vert?10:Math.min(68,Math.max(5,oy-sin*65));
      return(<svg width="88" height="72" viewBox="0 0 88 72" style={{display:'block',margin:'0 auto 6px'}}>
        <line x1="8" y1="62" x2="80" y2="62" stroke="#e5e5ea" strokeWidth="1"/>
        <line x1="8" y1="10" x2="8"  y2="62" stroke="#e5e5ea" strokeWidth="1"/>
        <line x1={ox} y1={oy} x2={ex} y2={ey} stroke="#0a84ff" strokeWidth="2.2" strokeLinecap="round"/>
        <circle cx={ox} cy={oy} r="3" fill="#0a84ff" opacity=".7"/>
      </svg>);
    };
    return(<div ref={sRef} className="sec secctr">
      <div style={{textAlign:'center',marginBottom:40,width:'100%',maxWidth:560}}>
        <div className="pill" style={{display:'inline-block',marginBottom:12}}>{sec.pill}</div>
        <h2 className="serif" style={{fontSize:'clamp(20px,3.5vw,34px)',fontWeight:400,color:'#1c1c1e',margin:0,letterSpacing:'-.02em'}}>{sec.q}</h2>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,width:'100%',maxWidth:480}}>
        {sec.opts.map(opt=>{
          const isok=opt.id===sec.cor,mine=ch===opt.id;
          let cl='kco';if(ch!=null){if(isok)cl+=' ok';else if(mine)cl+=' no';else cl+=' dim';}
          return(<button key={opt.id} className={cl} onClick={()=>pick(opt.id)} disabled={ch!=null}>
            <Beam a={opt.a}/>
            <span style={{fontSize:15,fontWeight:600,color:ch==null?'#1c1c1e':isok?'#1c5c35':mine?'#9b1c1c':'#aeaeb2'}}>{opt.id}</span>
          </button>);
        })}
      </div>
      {ch!=null&&ch!==sec.cor&&<div className="fup" style={{marginTop:22,maxWidth:420,padding:'14px 20px',background:'#f0f4ff',borderRadius:14,border:'1.5px solid #c7d2fe',textAlign:'center'}}>
        <p style={{fontSize:16,color:'#4338ca',lineHeight:1.6,margin:'0 0 0 0'}}>&#x1F914; {sec.soc}</p>
      </div>}
      {wrong&&ch==null&&<div className="fup" style={{marginTop:14,maxWidth:420,display:'flex',gap:12,alignItems:'center',justifyContent:'center',flexWrap:'wrap'}}>
        <span style={{fontSize:14,color:'#636366'}}>Try again, or</span>
        <button className="gbtn" onClick={()=>{if(!done.current){done.current=true;onDone();}}} style={{fontSize:14,padding:'8px 18px'}}>Continue anyway →</button>
      </div>}
      {ch===sec.cor&&<div className="scard fup" style={{marginTop:22}}><div style={{fontSize:24,marginBottom:4}}>&#x2713;</div><div style={{fontWeight:600,fontSize:15,color:'#1c5c35'}}>Correct!</div></div>}
    </div>);
  }

  function L2SubSec({subId,sRef,onDone,setLog}){
    const data=L2S[subId];
    const[angle,setAngle]=useState(data.a0);
    const[b,setB]=useState(data.b0);
    const[fired,setFired]=useState(false);
    const[baked,setBaked]=useState(new Set());
    const[hits,setHits]=useState(new Set());
    const[att,setAtt]=useState(0);
    const[blk,setBlk]=useState(false);
    const[blkPt,setBlkPt]=useState(null);
    const[ok,setOk]=useState(false);
    const[showY,setShowY]=useState(false);
    const[agMsg,setAgMsg]=useState('');
    const done=useRef(false);
    const vert=Math.abs(Math.abs(angle)-Math.PI/2)<.02,slope=vert?'∞':Math.tan(angle).toFixed(2);

    const ha=useCallback(a=>{
      if(ok&&done.current)return;setAngle(a);
      if(fired){setFired(false);setHits(new Set());setBlk(false);setAgMsg('');}
    },[fired,ok]);
    const hb=useCallback(nb=>{
      if(ok&&done.current)return;setB(nb);
      if(fired){setFired(false);setHits(new Set());setBlk(false);setAgMsg('');}
    },[fired,ok]);
    const deploy=()=>{
      const n=att+1;setAtt(n);setFired(true);
      let isBlk=false,bp=null;
      for(const o of (data.obs||[])){
        if(beamBlocked(angle,b,o)){isBlk=true;bp=blockedPt(angle,b,o);break;}
      }
      setLog(p=>({...p,answersLog:[...p.answersLog,{sec:'l2-'+subId,att:n,angle:(angle*180/Math.PI).toFixed(1),b:Math.round(b),blocked:isBlk}]}));
      if(isBlk){
        setBlk(true);setBlkPt(bp);setHits(new Set());
        setAgMsg("The slope is right, but the beam is starting too low. What happens if we add a higher y-value to our starting point?");
        return;
      }
      setBlk(false);
      const h=new Set();
      data.cookies.forEach(c=>{if(rayHits(angle,c.mx,c.my,b))h.add(c.id);});
      setHits(h);setBaked(p=>{const s=new Set(p);h.forEach(id=>s.add(id));return s;});
      if(h.size===data.cookies.length&&!done.current){
        done.current=true;setOk(true);
        if(data.yReveal){setTimeout(()=>setShowY(true),300);setTimeout(()=>setAgMsg(data.agOk),800);}
        onDone();
      }
    };
    const reset=()=>{setFired(false);setHits(new Set());setBlk(false);if(!done.current){setOk(false);setShowY(false);}setAgMsg('');};
    const handleAskTotoro=()=>{
      setAgMsg(att===0?'Try taking a shot first so I can see what you\'re thinking! Or remember: '+data.hint:'Hint: '+data.hint);
    };
    const miss=fired&&hits.size===0&&!blk,partial=fired&&hits.size>0&&hits.size<data.cookies.length&&!blk;

    return(<div ref={sRef} className="sec" style={{position:'relative'}}>
      <div style={{textAlign:'center',marginBottom:20,width:'100%',maxWidth:700}}>
        <div className="pill" style={{display:'inline-block',marginBottom:10}}>{data.pill}</div>
        <h2 className="serif" style={{fontSize:'clamp(22px,4vw,38px)',fontWeight:400,color:'#1c1c1e',margin:'0 0 8px',letterSpacing:'-.02em',lineHeight:1.15}}>{data.title}</h2>
        <p style={{color:'#636366',fontSize:16,lineHeight:1.6,margin:'0 auto',maxWidth:460}}>{data.desc}</p>
      </div>
      <div style={{marginBottom:14}}><L2Hud angle={angle} b={b}/></div>
      <Canvas2 angle={angle} onAngle={ha} b={b} onB={hb} fired={fired} baked={baked} hits={hits}
               cookies={data.cookies} obs={data.obs||[]} trees={data.trees||[]}
               showY={showY} blocked={blk} blkPt={blkPt}
               lockAngle={data.lock} allowNeg={data.neg}/>
      <div style={{marginTop:10,display:'flex',gap:14,flexWrap:'wrap',justifyContent:'center'}}>
        {data.lock
          ?<div className="lifthint">&#x1F512; Angle locked at 0°. Drag the LEFT side of canvas to raise the lift ↕</div>
          :<div style={{fontSize:14,color:'#c7c7cc',display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}}><span>🎯 Drag right side → aim barrel</span><span>↕ Drag left side → raise lift</span></div>
        }
      </div>
      {!fired&&!ok&&<div className="hcard" style={{marginTop:14}}>&#x1F4A1; {data.hint}</div>}
      {angle<-.05&&!ok&&<div className="fup" style={{marginTop:12,padding:'10px 16px',background:'#fff4ef',border:'1.5px solid #ffcbba',borderRadius:12,maxWidth:420,textAlign:'center',fontSize:15,color:'#c24a22'}}>
        &#x1F4D0; Negative slope! m = {Math.tan(angle).toFixed(2)} &mdash; the beam tilts <strong>downward</strong> from left to right. &Delta;y / &Delta;x &lt; 0.
      </div>}
      {blk&&<div className="blkcard fup" style={{marginTop:14}}><div style={{fontSize:20,marginBottom:5}}>&#x1F6A7; Blocked!</div><div style={{color:'#636366',fontSize:15,lineHeight:1.5}}>Beam hit the can. Raise the scissor lift!{att>=data.hintAfter&&<span style={{color:'#8e8e93'}}> Hint: lift above the obstacle height.</span>}</div></div>}
      {miss&&<div className="mcard fup" style={{marginTop:14}}><div style={{fontSize:20,marginBottom:5}}>&#x1F3AF; Miss</div><div style={{color:'#636366',fontSize:15,lineHeight:1.5}}>Beam missed. Adjust aim or lift.{att>=data.hintAfter&&<span style={{color:'#8e8e93'}}>{' '+data.hint}</span>}</div></div>}
      {partial&&<div className="pcard fup" style={{marginTop:14}}><div style={{fontSize:20,marginBottom:5}}>&#x1F3AF; Partial ({hits.size}/{data.cookies.length})</div><div style={{color:'#636366',fontSize:15}}>Hit some! Adjust slope and y-intercept to pass through both.</div></div>}
      {ok&&<div className="scard fup" style={{marginTop:14}}>
        <div style={{fontSize:24,marginBottom:6}}>&#x1F36A;&#x2728;</div>
        <div style={{fontWeight:600,fontSize:15,color:'#1c5c35',marginBottom:6}}>{data.okT}</div>
        <div style={{color:'#2d7a4b',fontSize:15,lineHeight:1.6}}>{data.okB(b,slope)}</div>
      </div>}
      {ok&&data.negTeach&&<div className="mnote fup" style={{marginTop:18}}>
        <div style={{fontSize:13,fontWeight:600,color:'#8e8e93',letterSpacing:'.06em',marginBottom:6}}>POSITIVE vs NEGATIVE SLOPE</div>
        <p style={{fontSize:15,color:'#3a3a3c',lineHeight:1.65,margin:0}}>
          Lines rising left &rarr; right have <strong>positive slope</strong> (m &gt; 0). Lines falling have <strong>negative slope</strong> (m &lt; 0). Horizontal: slope = 0. Vertical: slope is <em>undefined</em>.
        </p>
      </div>}
      <div style={{display:'flex',gap:12,marginTop:20,flexWrap:'wrap',justifyContent:'center'}}>
        {!ok&&<button className="dbtn" onClick={deploy} disabled={fired&&!blk&&!miss&&!partial}>&#x26A1; Deploy Beam</button>}
        {fired&&!ok&&<button className="gbtn" onClick={reset}>Reset</button>}
      </div>
      {att>0&&!ok&&<div style={{marginTop:8,fontSize:13,color:'#c7c7cc'}}>{att+' attempt'+(att!==1?'s':'')}</div>}
      <Agent msg={agMsg} setMsg={setAgMsg} onAsk={handleAskTotoro}/>
    </div>);
  }

  // ── Socratic state evaluator ────────────────────────────────────
// ── Socratic state evaluator ────────────────────────────────────
  function evaluateSocraticState({attempts,blkCount,idleSeconds,mode}){
    const len = attempts ? attempts.length : 0;
    const last = len > 0 ? attempts[len-1] : null;
    const prev = len > 1 ? attempts[len-2] : null;

    // 1. Idle Trigger (Fires BEFORE they shoot, hence len <= 1)
    if((mode==='pointslope'||mode==='slopeintercept') && idleSeconds >= 30 && len <= 1){
      return{trigger:'real_world',
        msg:"This equation might look abstract, but it's just a model. If you were predicting the cooling rate of an injection-molded part, m is how fast it cools and b is the starting temperature. What do x and y represent in that factory?"};
    }

    // If they haven't fired any shots yet, stop here.
    if(!last) return null;

    // 2. Wrong-Sign Trigger (Fires on any shot where they enter a positive slope for a downward target)
    if(last.mEntered !== undefined && last.mEntered > 0 && last.cookieDy < 0){
      return{trigger:'wrong_sign',
        msg:"I notice the cookie is lower than where the beam starts, but the slope is positive — the beam goes upward. How do we represent 'going down' in rise-over-run?"};
    }

    // 3. Obstacle Blindness Trigger (Fires if they hit the garbage can 3 times without changing b)
    if(blkCount >= 3 && attempts.filter(a => a.bChanged).length === 0){
      return{trigger:'obstacle_blind',
        msg:"That obstacle is sturdy! Changing the slope alone won't clear it. Is there a way to change where the beam starts vertically (the y-intercept)?"};
    }

    // 4. Over-Corrector Trigger (REQUIRES 2+ attempts to see if they are ping-ponging past the target)
    if(prev && prev.angle !== undefined && last.angle !== undefined){
      const target = last.targetAngle;
      if(target !== undefined){
        const e1 = prev.angle - target, e2 = last.angle - target;
        // e1*e2 < 0 means they crossed over the target. Math.abs(e2) > Math.abs(e1)*1.3 means they overshot worse than last time.
        if(e1 * e2 < 0 && Math.abs(e2) > Math.abs(e1) * 1.3){
          return{trigger:'overcorrect',
            msg:"You're bracketing the target — first you were a bit short, now a bit long. What if you split the difference between your last two shots?"};
        }
      }
    }
    
    return null;
  }

  // ── Slope Keypad ───────────────────────────────────────────────
  function SlopeKeypad({value,onChange,label='m =',disabled,maxVal=20,allowNeg=true}){
    const[raw,setRaw]=useState(value!=null?String(value):'');
    const[err,setErr]=useState('');
    // Only sync display when an *external* change sets a new committed value
    // (e.g. point-slope parser fills in b). Track last committed value to avoid
    // overwriting what the user is actively typing.
    const lastCommitted=useRef(value);
    useEffect(()=>{
      if(value!==lastCommitted.current){
        lastCommitted.current=value;
        setRaw(value!=null?String(value):'');
      }
    },[value]);
    const parse=s=>{
      const t=s.trim();
      if(t.includes('/')){const[n,d]=t.split('/');const v=parseFloat(n)/parseFloat(d);return isNaN(v)?null:v;}
      const v=parseFloat(t);return isNaN(v)?null:v;
    };
    const commit=()=>{
      const v=parse(raw);
      if(v===null){setErr('Enter a number or fraction like 2/3');return;}
      if(!allowNeg&&v<0){setErr('Value must be ≥ 0');return;}
      if(Math.abs(v)>maxVal){setErr(`Value must be between ${allowNeg?-maxVal:0} and ${maxVal}`);return;}
      setErr('');
      lastCommitted.current=v;
      onChange(v);
    };
    return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,minWidth:220}}>
      <div style={{fontSize:13,fontWeight:600,color:'#636366',letterSpacing:'.06em'}}>{label}</div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input value={raw} onChange={e=>{setRaw(e.target.value);setErr('');}}
               onKeyDown={e=>e.key==='Enter'&&commit()}
               disabled={disabled}
               placeholder={label.includes('b')?"e.g. 30":"e.g. 1/2 or 0.5"}
               style={{width:130,border:'1.5px solid '+(err?'#ff3b30':'#d1d1d6'),borderRadius:10,
                       padding:'10px 13px',fontSize:16,fontFamily:'monospace',outline:'none',
                       background:disabled?'#f9f9fb':'#fff',color:'#1c1c1e'}}/>
        <button className="nbtn" onClick={commit} disabled={disabled}
                style={{padding:'10px 18px',fontSize:15}}>Set</button>
      </div>
      {err&&<p style={{fontSize:13,color:'#ff3b30',margin:0}}>{err}</p>}
    </div>);
  }

  // ── Canvas3: display + optional lift drag + optional slope-measure tool ──
  // liftDrag=true: left-edge drag sets b (levels 3.1-3.3)
  // liftDrag=false: b comes only from keypad (levels 3.4-3.6, b is algebraically computed)
  function Canvas3({angle,b,onB,fired,baked,hits,cookies,obs,trees,showY,blocked,blkPt,enableMeasure,liftDrag}){
    const svgRef=useRef(null),liftDragging=useRef(false);
    const[dl,setDl]=useState(false);
    const[mDrag,setMDrag]=useState(false);
    const[mStart,setMStart]=useState(null);
    const[mEnd,setMEnd]=useState(null);
    const gp=useCallback((cx,cy)=>{
      const svg=svgRef.current;if(!svg)return null;
      const r=svg.getBoundingClientRect();
      return{sx:(cx-r.left)*(CW/r.width),sy:(cy-r.top)*(CH/r.height)};
    },[]);
    const s2m=useCallback((sx,sy)=>({mx:sx-OX,my:OY-sy}),[]);
    const dn=useCallback(e=>{
      const p=e.touches?e.touches[0]:e,v=gp(p.clientX,p.clientY);if(!v)return;
      if(liftDrag&&v.sx<OX+35){e.preventDefault();liftDragging.current=true;setDl(true);}
      else if(enableMeasure){e.preventDefault();setMDrag(true);setMStart(v);setMEnd(v);}
    },[gp,enableMeasure,liftDrag]);
    const mv=useCallback(e=>{
      const p=e.touches?e.touches[0]:e,v=gp(p.clientX,p.clientY);if(!v)return;
      if(liftDragging.current){e.preventDefault();onB(Math.max(0,Math.min(300,OY-v.sy)));}
      else if(mDrag){e.preventDefault();setMEnd(v);}
    },[gp,onB,mDrag]);
    const up=useCallback(()=>{liftDragging.current=false;setDl(false);setMDrag(false);},[]);
    useEffect(()=>{
      window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
      window.addEventListener('touchmove',mv,{passive:false});window.addEventListener('touchend',up);
      return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);window.removeEventListener('touchmove',mv);window.removeEventListener('touchend',up);};
    },[mv,up]);

    const orig=m2s(0,b),ep=beamEnd(angle,b),fe=blocked&&blkPt?blkPt:ep;

    // Slope triangle from measure drag
    let mTriangle=null;
    if(mStart&&mEnd&&(mDrag||(mStart.sx!==mEnd.sx||mStart.sy!==mEnd.sy))){
      const mc=s2m(mEnd.sx,mEnd.sy),ms=s2m(mStart.sx,mStart.sy);
      const dy=mc.my-ms.my,dx=mc.mx-ms.mx;
      if(Math.abs(dx)>5){
        const slope=(dy/dx);
        const cornerSx=mEnd.sx,cornerSy=mStart.sy;
        const offDy=dx>=0?18:-32;
        const offDx=dy>=0?-18:18;
        mTriangle=<g opacity=".95">
          <polygon points={`${mStart.sx},${mStart.sy} ${mEnd.sx},${mEnd.sy} ${cornerSx},${cornerSy}`} fill="rgba(255,215,80,.18)"/>
          <line x1={mEnd.sx} y1={mStart.sy} x2={mEnd.sx} y2={mEnd.sy} stroke="#34c759" strokeWidth="2.5" strokeDasharray="5 3"/>
          <line x1={mStart.sx} y1={mStart.sy} x2={mEnd.sx} y2={mStart.sy} stroke="#0a84ff" strokeWidth="2.5" strokeDasharray="5 3"/>
          <rect x={mEnd.sx+offDy-24} y={(mStart.sy+mEnd.sy)/2-10} width="50" height="20" rx="5" fill="#34c759"/>
          <text x={mEnd.sx+offDy+1} y={(mStart.sy+mEnd.sy)/2+6} textAnchor="middle" fontSize="11" fill="white" fontWeight="700">Δy={Math.round(dy)}</text>
          <rect x={(mStart.sx+mEnd.sx)/2-25} y={mStart.sy+offDx-10} width="50" height="20" rx="5" fill="#0a84ff"/>
          <text x={(mStart.sx+mEnd.sx)/2} y={mStart.sy+offDx+6} textAnchor="middle" fontSize="11" fill="white" fontWeight="700">Δx={Math.round(dx)}</text>
          <rect x={mEnd.sx+offDy-34} y={(mStart.sy+mEnd.sy)/2+16} width="70" height="20" rx="5" fill="#1c1c1e"/>
          <text x={mEnd.sx+offDy+1} y={(mStart.sy+mEnd.sy)/2+30} textAnchor="middle" fontSize="11" fill="white" fontWeight="700">m={slope.toFixed(3)}</text>
        </g>;
      }
    }

    return(<div className="canvas-wrap">
      <svg ref={svgRef} viewBox={'0 0 '+CW+' '+CH} className="gsvg"
           style={{maxHeight:450,cursor:enableMeasure?'crosshair':'default'}} onMouseDown={dn} onTouchStart={dn}>
        <ParkScene trees={trees} pfx="l3"/>
        <Grid/>
        {cookies.map(c=>{const p=m2s(c.mx,c.my);return(
          <text key={'lbl'+c.id} x={p.x+18} y={p.y-14} fontSize="10" fill="#636366" fontFamily="monospace" fontWeight="600">({c.mx},{c.my})</text>
        );})}

        {showY&&b>0&&<line className="yline" x1={OX} y1={OY} x2={OX} y2={OY-b} stroke="#0a84ff" strokeWidth="5" strokeLinecap="round"/>}
        {b>1&&<text x={OX+8} y={OY-b-6} fontSize="10" fill="#0a84ff" fontFamily="monospace" fontWeight="600">{'b='+Math.round(b)}</text>}
        {obs.map((o,i)=><ParkBench key={i} {...o} blocked={blocked}/>)}
        <ScissorLift b={b} ld={dl} showDragHandle={liftDrag}/>
        <line x1={orig.x} y1={orig.y} x2={ep.x} y2={ep.y} stroke="#0a84ff" strokeWidth="1.5" strokeDasharray="5 7" opacity=".55" style={{pointerEvents:'none'}}/>
        <MaserSVG angle={angle} dragging={false} b={b} showHandle={false}/>
        {fired&&<line className="beam-line" x1={orig.x} y1={orig.y} x2={fe.x} y2={fe.y}
                      stroke={blocked?'#ff9f0a':'#0a84ff'} strokeWidth="2.5" strokeLinecap="round" style={{pointerEvents:'none'}}/>}
        {cookies.map(c=><CookieSVG key={c.id} mx={c.mx} my={c.my} baked={baked.has(c.id)} pop={hits.has(c.id)} showId={cookies.length>1} cid={'l3'+c.id}/>)}
        {fired&&!blocked&&[...hits].map(id=>{const c=cookies.find(x=>x.id===id);return c?<Spark key={id} mx={c.mx} my={c.my}/>:null;})}
        {mTriangle}
        {enableMeasure&&!mDrag&&<text x={OX+20} y={20} fontSize="11" fill="#aeaeb2" fontFamily="monospace">drag between cookies to measure slope</text>}
      </svg>
    </div>);
  }


  // ── L3SubSec ────────────────────────────────────────────────────
  function L3SubSec({subId,sRef,onDone,setLog}){
    const data=L3S[subId];
    const[angle,setAngle]=useState(Math.PI/8);
    const[b,setB]=useState(0);
    const[mInput,setMInput]=useState(null);  // numeric m from keypad
    const[bInput,setBInput]=useState(null);  // numeric b for slopeintercept
    const[dyInput,setDyInput]=useState('');  // scaffolded Δy entry
    const[dxInput,setDxInput]=useState('');  // scaffolded Δx entry
    const[psY1,setPsY1]=useState('');    // box 1: y₁
    const[psM,setPsM]=useState('');     // box 2: m
    const[psX1,setPsX1]=useState('');   // box 3: x₁
    const[psErr,setPsErr]=useState('');
    const[psFeedback,setPsFeedback]=useState('');
    const[fired,setFired]=useState(false);
    const[baked,setBaked]=useState(new Set());
    const[hits,setHits]=useState(new Set());
    const[att,setAtt]=useState(0);
    const[blk,setBlk]=useState(false);
    const[blkPt,setBlkPt]=useState(null);
    const[ok,setOk]=useState(false);
    const[agMsg,setAgMsg]=useState('');
    const[blkCount,setBlkCount]=useState(0);
    const[lastActive,setLastActive]=useState(Date.now());
    const[idleSecs,setIdleSecs]=useState(0);
    const attLog=useRef([]);
    const done=useRef(false);
    const vert=Math.abs(Math.abs(angle)-Math.PI/2)<.02;
    const slope=vert?'∞':Math.tan(angle).toFixed(3);

    // Idle timer for Socratic trigger
    useEffect(()=>{
      const iv=setInterval(()=>setIdleSecs(s=>s+1),1000);
      return()=>clearInterval(iv);
    },[]);
    const resetIdle=()=>{setLastActive(Date.now());setIdleSecs(0);};

    // When m keypad fires, set angle
    const onMSet=useCallback(m=>{
      setAngle(Math.atan(m));setMInput(m);resetIdle();
      if(fired){setFired(false);setHits(new Set());setBlk(false);setAgMsg('');}
    },[fired]);

    // When b keypad fires, set b
    const onBSet=useCallback(bv=>{
      setB(bv);setBInput(bv);resetIdle();
      if(fired){setFired(false);setHits(new Set());setBlk(false);setAgMsg('');}
    },[fired]);

    // Scaffold: compute m from Δy/Δx entries
    const scaffoldM=()=>{
      const dy=parseFloat(dyInput),dx=parseFloat(dxInput);
      if(isNaN(dy)||isNaN(dx)||dx===0){setAgMsg('Enter valid numbers for Δy and Δx.');return;}
      const m=dy/dx;
      setAngle(Math.atan(m));setMInput(parseFloat(m.toFixed(4)));
      setAgMsg('Computed m = '+dy+'/'+dx+' = '+m.toFixed(4)+'. Angle set! Now adjust the lift and fire.');
    };

    // 3-box point-slope grader
    const parseFracBox=raw=>{
      const t=(raw||'').trim();
      if(t==='')return null;
      if(t.includes('/')){
        const parts=t.split('/');
        if(parts.length!==2)return null;
        const n=parseFloat(parts[0]),d=parseFloat(parts[1]);
        if(isNaN(n)||isNaN(d)||d===0)return null;
        return n/d;
      }
      const v=parseFloat(t);
      return isNaN(v)?null:v;
    };
    const applyPointSlope=()=>{
      setPsErr('');setPsFeedback('');
      const y1v=parseFracBox(psY1),mv=parseFracBox(psM),x1v=parseFracBox(psX1);
      if(y1v===null||mv===null||x1v===null){
        setPsErr('Fill in all three boxes. You can use decimals or fractions like 1/2.');
        return;
      }
      // Grade: plug both known points (0,20) and (300,170) into (y − y₁) = m(x − x₁)
      const EPS=1e-5;
      const check1=Math.abs((20 -y1v)-mv*(0  -x1v))<EPS;
      const check2=Math.abs((170-y1v)-mv*(300-x1v))<EPS;
      if(check1&&check2){
        // Correct equation — check it uses an actual cookie coordinate as the anchor point
        const usedA=Math.abs(x1v-0)<EPS  &&Math.abs(y1v-20 )<EPS;
        const usedB=Math.abs(x1v-300)<EPS&&Math.abs(y1v-170)<EPS;
        if(!usedA&&!usedB){
          setPsFeedback('✓ Your equation describes the correct line — nice algebra! But point-slope form asks you to use one of the cookie coordinates as (x₁, y₁). Try (0, 20) or (300, 170).');
          return;
        }
        // Fully correct — set cannon and confirm
        const bVal=y1v-mv*x1v;
        setAngle(Math.atan(mv));setMInput(mv);
        setB(Math.max(0,Math.min(300,bVal)));setBInput(bVal);
        setAgMsg('Point-slope confirmed ✓  m = '+mv+', b = '+bVal.toFixed(1)+'. Hit Deploy to fire!');
        resetIdle();
      } else {
        // Wrong — targeted feedback
        if(mv<0){
          setPsErr('Your slope m is negative, but this line rises from left to right — m should be positive. Check your rise ÷ run.');
        } else if(Math.abs(mv-0.5)<EPS){
          // Slope right but wrong point
          setPsErr('Your slope looks right! But the point ('+psX1+', '+psY1+') doesn\'t sit on this line. Use a cookie coordinate: (0, 20) or (300, 170).');
        } else {
          setPsErr('That doesn\'t satisfy both cookie coordinates. Verify that (y − y₁) = m(x − x₁) holds for both (0, 20) and (300, 170).');
        }
      }
    };

    const ha=useCallback(a=>{
      if(ok&&done.current)return;setAngle(a);setMInput(parseFloat(Math.tan(a).toFixed(3)));resetIdle();
      if(fired){setFired(false);setHits(new Set());setBlk(false);setAgMsg('');}
    },[fired,ok]);
    const hb=useCallback(nb=>{
      if(ok&&done.current)return;setB(nb);resetIdle();
      if(fired){setFired(false);setHits(new Set());setBlk(false);setAgMsg('');}
    },[fired,ok]);

    const deploy=()=>{
      const n=att+1;setAtt(n);setFired(true);resetIdle();
      let isBlk=false,bp=null;
      for(const o of(data.obs||[])){
        if(beamBlocked(angle,b,o)){isBlk=true;bp=blockedPt(angle,b,o);break;}
      }
      // Log attempt
      const cookieTarget=data.cookies[0];
      const cookieDy=cookieTarget?cookieTarget.my-b:0;
      const targetAngle=cookieTarget?Math.atan2(cookieTarget.my-b,cookieTarget.mx):0;
      const aEntry={angle,mEntered:mInput,b,blocked:isBlk,bChanged:n>1&&Math.abs(b-(attLog.current[n-2]?.b||0))>2,cookieDy,targetAngle};
      attLog.current.push(aEntry);
      setLog(p=>({...p,answersLog:[...p.answersLog,{sec:'l3-'+subId,att:n,angle:(angle*180/Math.PI).toFixed(1),b:Math.round(b),blocked:isBlk}]}));
      if(isBlk){
        setBlkCount(c=>c+1);setBlk(true);setBlkPt(bp);setHits(new Set());
        const soc=evaluateSocraticState({attempts:attLog.current,blkCount:blkCount+1,idleSeconds:idleSecs,mode:data.mode});
        setAgMsg(soc?soc.msg:"Blocked! Raise the scissor lift to clear the obstacle.");
        return;
      }
      setBlk(false);
      const h=new Set();
      data.cookies.forEach(c=>{if(rayHits(angle,c.mx,c.my,b))h.add(c.id);});
      setHits(h);setBaked(p=>{const s=new Set(p);h.forEach(id=>s.add(id));return s;});
      if(h.size===data.cookies.length&&!done.current){
        done.current=true;setOk(true);
        onDone();
      } else if(h.size===0&&!isBlk){
        const soc=evaluateSocraticState({attempts:attLog.current,blkCount,idleSeconds:idleSecs,mode:data.mode});
        if(soc)setAgMsg(soc.msg);
      }
    };
    const reset=()=>{setFired(false);setHits(new Set());setBlk(false);if(!done.current)setOk(false);setAgMsg('');};
    const handleAskTotoro=()=>{
      const soc=evaluateSocraticState({attempts:attLog.current,blkCount,idleSeconds:idleSecs,mode:data.mode});
      setAgMsg(soc?soc.msg:data.hint);
    };

    const miss=fired&&hits.size===0&&!blk;
    const partial=fired&&hits.size>0&&hits.size<data.cookies.length&&!blk;
    const vert2=Math.abs(Math.abs(angle)-Math.PI/2)<.02;
    const mDisplay=vert2?'∞':Math.tan(angle).toFixed(3);

    // Idle Socratic nudge
    useEffect(()=>{
      if(idleSecs===30&&att<=1&&!ok){
        const soc=evaluateSocraticState({attempts:attLog.current,blkCount,idleSeconds:30,mode:data.mode});
        if(soc)setAgMsg(soc.msg);
      }
    },[idleSecs]);

    return(<div ref={sRef} className="sec" style={{position:'relative'}}>
      <div style={{textAlign:'center',marginBottom:20,width:'100%',maxWidth:700}}>
        <div className="pill" style={{display:'inline-block',marginBottom:10}}>{data.pill}</div>
        <h2 className="serif" style={{fontSize:'clamp(22px,4vw,38px)',fontWeight:400,color:'#1c1c1e',margin:'0 0 8px',letterSpacing:'-.02em',lineHeight:1.15}}>{data.title}</h2>
        <p style={{color:'#636366',fontSize:16,lineHeight:1.6,margin:'0 auto',maxWidth:500}}>{data.desc}</p>
      </div>

      {/* HUD */}
      <div style={{marginBottom:14,display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center',alignItems:'center'}}>
        <div className="hud">
          <span style={{fontSize:14,color:'rgba(255,255,255,.5)',fontWeight:500}}>y =</span>
          <span style={{fontSize:18,fontFamily:'Georgia,serif',color:'#fff',letterSpacing:'-.01em'}}>{mDisplay}x {b>=0?'+ '+Math.round(b):'− '+Math.round(-b)}</span>
          <span style={{fontSize:14,color:'rgba(255,255,255,.4)'}}>m = {mDisplay}</span>
        </div>
      </div>

      {/* Canvas */}
      <Canvas3 angle={angle} b={b} onB={hb}
               fired={fired} baked={baked} hits={hits}
               cookies={data.cookies} obs={data.obs||[]} trees={data.trees||[]}
               showY={b>0} blocked={blk} blkPt={blkPt}
               enableMeasure={data.mode==='measure'}
               liftDrag={data.liftDrag}/>

      {/* Controls below canvas */}
      <div style={{marginTop:16,width:'100%',maxWidth:680,display:'flex',flexDirection:'column',gap:14,alignItems:'center'}}>

        {/* MODE: measure or compute — slope keypad */}
        {(data.mode==='measure'||data.mode==='compute')&&<div className="wcard" style={{width:'100%',padding:'18px 22px'}}>
          <div style={{fontSize:13,fontWeight:600,color:'#636366',letterSpacing:'.06em',marginBottom:12}}>
            {data.mode==='measure'?'STEP 1: Drag between cookies to measure slope, then set m below':'STEP 1: Calculate m from the coordinates'}
          </div>
          {data.mode==='compute'&&<div style={{marginBottom:12,background:'#f0f4ff',borderRadius:10,padding:'10px 14px',fontFamily:'monospace',fontSize:14,color:'#3a3a3c'}}>
            Cookie A = ({data.cookies[0].mx}, {data.cookies[0].my}), Cookie B = ({data.cookies[1]?.mx||'?'}, {data.cookies[1]?.my||'?'})
            <br/>m = <Frac n={<>y<sub>B</sub>−y<sub>A</sub></>} d={<>x<sub>B</sub>−x<sub>A</sub></>} size={13}/>
          </div>}
          <SlopeKeypad value={mInput} onChange={onMSet} label="Enter m =" disabled={ok}/>
          <div style={{marginTop:12,fontSize:13,color:'#aeaeb2'}}>{data.liftDrag?'⬆ Drag left side of canvas to set lift height (b)':'Enter b via the slope-intercept keypad below, or use point-slope form to compute it.'}</div>
        </div>}

        {/* MODE: scaffold Δy/Δx */}
        {data.mode==='compute'&&data.cookies.length>=2&&!mInput&&<div className="icard" style={{width:'100%',padding:'16px 20px'}}>
          <div style={{fontSize:13,fontWeight:600,color:'#4338ca',marginBottom:10}}>Need help? Compute Δy and Δx first:</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <label style={{fontSize:13,color:'#636366',fontWeight:500}}>Δy = y<sub>B</sub> − y<sub>A</sub></label>
              <input value={dyInput} onChange={e=>setDyInput(e.target.value)} placeholder={data.cookies[1]?.my+' − '+data.cookies[0].my}
                     style={{width:110,border:'1.5px solid #c7d2fe',borderRadius:8,padding:'8px 11px',fontSize:15,fontFamily:'monospace',outline:'none'}}/>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <label style={{fontSize:13,color:'#636366',fontWeight:500}}>Δx = x<sub>B</sub> − x<sub>A</sub></label>
              <input value={dxInput} onChange={e=>setDxInput(e.target.value)} placeholder={data.cookies[1]?.mx+' − '+data.cookies[0].mx}
                     style={{width:110,border:'1.5px solid #c7d2fe',borderRadius:8,padding:'8px 11px',fontSize:15,fontFamily:'monospace',outline:'none'}}/>
            </div>
            <button className="gbtn" style={{marginTop:18}} onClick={scaffoldM}>Compute m →</button>
          </div>
        </div>}

        {/* MODE: point-slope */}
        {data.mode==='pointslope'&&<div className="wcard" style={{width:'100%',padding:'18px 22px'}}>
          <div style={{fontSize:13,fontWeight:600,color:'#636366',letterSpacing:'.06em',marginBottom:10}}>ENTER POINT-SLOPE EQUATION</div>
          <div style={{background:'#f0f4ff',borderRadius:10,padding:'10px 14px',marginBottom:14,fontFamily:'monospace',fontSize:14,color:'#3a3a3c'}}>
            Cookies: ({data.cookies[0].mx},{data.cookies[0].my}) &amp; ({data.cookies[1].mx},{data.cookies[1].my})
            &nbsp;·&nbsp; Use either as your (x₁, y₁)
          </div>
          {/* Inline equation: y − [box1] = [box2] ( x − [box3] ) */}
          <div style={{display:'flex',alignItems:'center',gap:5,flexWrap:'wrap',fontSize:19,color:'#1c1c1e',marginBottom:10,fontFamily:'Georgia,serif'}}>
            <span style={{fontStyle:'italic'}}>y</span>
            <span>−</span>
            <input value={psY1} onChange={e=>{setPsY1(e.target.value);setPsErr('');setPsFeedback('');}}
                   onKeyDown={e=>e.key==='Enter'&&applyPointSlope()}
                   placeholder="y₁" aria-label="y₁"
                   style={{width:60,border:'2px solid '+(psErr?'#ff3b30':'#c7d2fe'),borderRadius:8,
                           padding:'5px 7px',fontSize:16,fontFamily:'monospace',outline:'none',
                           textAlign:'center',background:'#fafbff'}}/>
            <span>=</span>
            <input value={psM} onChange={e=>{setPsM(e.target.value);setPsErr('');setPsFeedback('');}}
                   onKeyDown={e=>e.key==='Enter'&&applyPointSlope()}
                   placeholder="m" aria-label="m"
                   style={{width:60,border:'2px solid '+(psErr?'#ff3b30':'#c7d2fe'),borderRadius:8,
                           padding:'5px 7px',fontSize:16,fontFamily:'monospace',outline:'none',
                           textAlign:'center',background:'#fafbff'}}/>
            <span style={{fontSize:18}}>(</span>
            <span style={{fontStyle:'italic'}}>x</span>
            <span>−</span>
            <input value={psX1} onChange={e=>{setPsX1(e.target.value);setPsErr('');setPsFeedback('');}}
                   onKeyDown={e=>e.key==='Enter'&&applyPointSlope()}
                   placeholder="x₁" aria-label="x₁"
                   style={{width:60,border:'2px solid '+(psErr?'#ff3b30':'#c7d2fe'),borderRadius:8,
                           padding:'5px 7px',fontSize:16,fontFamily:'monospace',outline:'none',
                           textAlign:'center',background:'#fafbff'}}/>
            <span>)</span>
            <button className="nbtn" onClick={applyPointSlope}
                    style={{padding:'7px 18px',fontSize:15,marginLeft:6}}>Check ✓</button>
          </div>

        {/* MODE: slope-intercept */}

            <SlopeKeypad value={bInput} onChange={onBSet} label="b =" disabled={ok} maxVal={300} allowNeg={false}/>

          <p style={{fontSize:13,color:'#aeaeb2',marginTop:10,textAlign:'center'}}>

        </div>}

        {/* Action buttons */}
        <div style={{display:'flex',gap:12,flexWrap:'wrap',justifyContent:'center'}}>
          {!ok&&<button className="dbtn" onClick={deploy} disabled={fired&&!blk&&!miss&&!partial}>⚡ Deploy Beam</button>}
          {fired&&!ok&&<button className="gbtn" onClick={reset}>Reset</button>}
        </div>
        {att>0&&!ok&&<div style={{fontSize:13,color:'#c7c7cc',marginTop:4}}>{att+' attempt'+(att!==1?'s':'')}</div>}

        {/* Feedback cards */}
        {!fired&&!ok&&att===0&&<div className="hcard">💡 {data.hint}</div>}
        {blk&&<div className="blkcard fup"><div style={{fontSize:20,marginBottom:5}}>🚧 Blocked!</div><div style={{color:'#636366',fontSize:15}}>Beam hit the obstacle. Raise the lift!{att>=data.hintAfter&&<span style={{color:'#8e8e93'}}> Lift above height {data.obs[0]?.height}.</span>}</div></div>}
        {miss&&<div className="mcard fup"><div style={{fontSize:20,marginBottom:5}}>🎯 Miss</div><div style={{color:'#636366',fontSize:15,lineHeight:1.5}}>The beam didn't reach the cookie. Check your m and b values.{att>=data.hintAfter&&<><br/><span style={{color:'#8e8e93'}}>{data.hint}</span></>}</div></div>}
        {partial&&<div className="pcard fup"><div style={{fontSize:20,marginBottom:5}}>🎯 Partial ({hits.size}/{data.cookies.length})</div><div style={{color:'#636366',fontSize:15}}>Hit some — adjust m or b to pass through all cookies.</div></div>}
        {ok&&<div className="scard fup"><div style={{fontSize:24,marginBottom:6}}>🍪✨</div><div style={{fontWeight:600,fontSize:15,color:'#1c5c35',marginBottom:6}}>{data.okT}</div><div style={{color:'#2d7a4b',fontSize:15,lineHeight:1.6}}>{data.okB(b,mDisplay)}</div></div>}

        {/* Socratic agent message */}
        {agMsg&&<div className="fup" style={{marginTop:4,display:'flex',gap:12,alignItems:'flex-start',width:'100%',maxWidth:520,background:'#f0f4ff',borderRadius:14,padding:'14px 16px',border:'1.5px solid #c7d2fe'}}>
          <TutorFace size={44}/>
          <div style={{fontSize:15,color:'#3a3a3c',lineHeight:1.65,flex:1}}>{agMsg}</div>
          <button onClick={()=>setAgMsg('')} style={{background:'none',border:'none',cursor:'pointer',fontSize:17,color:'#aeaeb2',padding:'0 4px',lineHeight:1,flexShrink:0}}>×</button>
        </div>}
      </div>
      <Agent msg={agMsg} setMsg={setAgMsg} onAsk={handleAskTotoro}/>
    </div>);
  }

  // ════════════════ LEVEL 3 TEACHING MOMENT: Point-Slope Form ════
  function L3TeachSec({sRef,onDone}){
    // Two example cookies matching 3.4
    const CA={mx:0,my:20},CB={mx:300,my:170};
    const m=0.5,b=20;
    // Which point the student is currently viewing: 'A' or 'B'

    // y-sign display helper: y - (+20) → "y − 20", y - (-5) → "y + 5"
    const showY1=(y1)=>y1===0?'y':(y1>0?`y − ${y1}`:`y + ${Math.abs(y1)}`);

    return(<div ref={sRef} className="sec secctr">

          <p style={{color:'#636366',fontSize:16,lineHeight:1.65,margin:0}}>
            If a point <strong>(x₁, y₁)</strong> lies on a line with slope <strong>m</strong>, then <em>every</em> other point (x, y) on that line satisfies:
          </p>
        </div>

        {/* Formula display */}
        <div style={{background:'linear-gradient(135deg,#f0f4ff,#e8eeff)',border:'1.5px solid #c7d2fe',
                     borderRadius:18,padding:'20px 32px',textAlign:'center',width:'100%'}}>
          <div style={{fontSize:22,fontFamily:'Georgia,serif',color:'#1c1c1e',letterSpacing:'.01em',lineHeight:1.6}}>
            <span style={{color:'#636366',fontSize:16,display:'block',marginBottom:6,fontFamily:'system-ui'}}>point-slope form</span>
            <span style={{color:'#34c759',fontWeight:700}}>{showY1(pt.my)}</span>
            <span style={{color:'#1c1c1e'}}> = </span>
            <span style={{color:'#0a84ff',fontWeight:700}}>m</span>
            <span style={{color:'#1c1c1e'}}> · (</span>
            <span style={{color:'#ff9f0a',fontWeight:700}}>{showX1(pt.mx)}</span>
            <span style={{color:'#1c1c1e'}}>)</span>
          </div>
          <div style={{marginTop:10,fontSize:15,color:'#636366',fontFamily:'monospace'}}>
            with <span style={{color:'#0a84ff',fontWeight:600}}>m = {m}</span> and point&nbsp;
            <span style={{color:active==='A'?'#34c759':'#ff9f0a',fontWeight:600}}>
              ({pt.mx}, {pt.my})
            </span>
            {' → '}
            <span style={{color:'#636366'}}>
              {showY1(pt.my)} = {m}({showX1(pt.mx)})
            </span>
          </div>
          {/* Show solved b */}
          <div style={{marginTop:8,fontSize:14,color:'#8e8e93',fontFamily:'monospace'}}>
            solve for y: y = {m}x + <span style={{color:'#ff3b30',fontWeight:600}}>{b}</span>
            {' '}→ b = {b} ✓
          </div>
        </div>

        {/* Interactive: pick which point */}
        <div style={{width:'100%',background:'#f9f9fb',borderRadius:16,border:'1.5px solid #e5e5ea',padding:'18px 22px'}}>
          <div style={{fontSize:13,fontWeight:600,color:'#8e8e93',letterSpacing:'.07em',marginBottom:12}}>
            THE KEY INSIGHT — EITHER POINT WORKS
          </div>
          <p style={{fontSize:15,color:'#3a3a3c',lineHeight:1.6,margin:'0 0 14px'}}>
            Two cookies sit on the same line. You can write the equation using <strong>either</strong> one as (x₁, y₁). Both give the same line.
          </p>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginBottom:16}}>
            {['A','B'].map(lbl=>{
              const p=lbl==='A'?CA:CB;
              const isActive=active===lbl;
              return(<button key={lbl} onClick={()=>{setActive(lbl);setStep(s=>Math.max(s,1));}}
                style={{padding:'10px 24px',borderRadius:12,border:'2px solid',fontSize:15,fontWeight:600,cursor:'pointer',
                        borderColor:isActive?'#0a84ff':'#d1d1d6',
                        background:isActive?'#0a84ff':'#fff',
                        color:isActive?'#fff':'#636366',transition:'all .2s'}}>
                Cookie {lbl} = ({p.mx}, {p.my})
              </button>);
            })}
          </div>

          {/* Mini SVG graph */}
          <svg viewBox="0 0 340 180" style={{width:'100%',maxWidth:400,display:'block',margin:'0 auto',borderRadius:10,background:'#fff',border:'1px solid #f2f2f7'}}>
            {/* Axes */}
            <line x1={GX} y1={10} x2={GX} y2={GY+5} stroke="#e5e5ea" strokeWidth="1.5"/>
            <line x1={GX-5} y1={GY} x2={320} y2={GY} stroke="#e5e5ea" strokeWidth="1.5"/>
            {/* Grid lines every 100 math units */}
            {[100,200,300,400].map(mx=><line key={mx} x1={tg(mx,0).x} y1={10} x2={tg(mx,0).x} y2={GY} stroke="#f2f2f7" strokeWidth="1"/>)}
            {[50,100,150].map(my=><line key={my} x1={GX} y1={tg(0,my).y} x2={320} y2={tg(0,my).y} stroke="#f2f2f7" strokeWidth="1"/>)}
            {/* The line */}
            <line x1={lineStart.x} y1={lineStart.y} x2={lineEnd.x} y2={lineEnd.y} stroke="#0a84ff" strokeWidth="2" opacity=".7"/>
            {/* Rise/run triangle to active point */}
            {step>=1&&<>
              <line x1={tg(0,b).x} y1={tg(0,b).y} x2={ptSvg.x} y2={tg(0,b).y} stroke="#ff9f0a" strokeWidth="1.5" strokeDasharray="4 3"/>
              <line x1={ptSvg.x} y1={tg(0,b).y} x2={ptSvg.x} y2={ptSvg.y} stroke="#34c759" strokeWidth="1.5" strokeDasharray="4 3"/>
            </>}
            {/* Other cookie (dimmed) */}
            <circle cx={otherSvg.x} cy={otherSvg.y} r="7" fill="#f5deb3" stroke="#c4a35a" strokeWidth="1.5" opacity=".5"/>
            <text x={otherSvg.x+9} y={otherSvg.y-7} fontSize="9" fill="#aeaeb2" fontFamily="monospace">{otherLabel}</text>
            {/* Active cookie */}
            <circle cx={ptSvg.x} cy={ptSvg.y} r="9" fill="#f5deb3" stroke="#c4a35a" strokeWidth="2"/>
            <text x={ptSvg.x+11} y={ptSvg.y-8} fontSize="9" fill="#3a3a3c" fontFamily="monospace" fontWeight="700">{active} ({pt.mx},{pt.my})</text>
            {/* b marker */}
            <circle cx={lineStart.x} cy={lineStart.y} r="4" fill="#ff3b30" opacity=".7"/>
            <text x={lineStart.x+6} y={lineStart.y+4} fontSize="9" fill="#ff3b30" fontFamily="monospace">b={b}</text>
            {/* Axis labels */}
            <text x={315} y={GY+14} fontSize="9" fill="#aeaeb2" fontFamily="monospace">x</text>
            <text x={GX-14} y={14} fontSize="9" fill="#aeaeb2" fontFamily="monospace">y</text>
          </svg>

          {step>=1&&<div style={{marginTop:14,background:'#f0f9ff',border:'1.5px solid #bae6fd',borderRadius:10,padding:'12px 16px',fontSize:14,color:'#0369a1',lineHeight:1.6}}>
            Using <strong>Cookie {active} = ({pt.mx}, {pt.my})</strong>:<br/>
            <span style={{fontFamily:'monospace'}}>{showY1(pt.my)} = {m}·({showX1(pt.mx)})</span><br/>
            Rearranges to: <span style={{fontFamily:'monospace',color:'#0a84ff',fontWeight:600}}>y = {m}x + {b}</span>
            {step>=1&&active==='A'&&<span style={{color:'#636366'}}> — try Cookie B now!</span>}
            {step>=1&&active==='B'&&<span style={{color:'#34c759',fontWeight:600}}> ✓ Same line!</span>}
          </div>}
        </div>

        {/* Summary callout */}
        <div style={{background:'linear-gradient(135deg,#ecfdf5,#d1fae5)',border:'1.5px solid #6ee7b7',borderRadius:14,padding:'16px 20px',width:'100%'}}>
          <div style={{fontSize:13,fontWeight:700,color:'#065f46',letterSpacing:'.06em',marginBottom:6}}>TAKEAWAY</div>
          <p style={{fontSize:15,color:'#064e3b',lineHeight:1.65,margin:0}}>
            <strong>y − y₁ = m(x − x₁)</strong> works with <em>any</em> point on the line. Different choices of (x₁, y₁) give equations that look different but describe the <em>same line</em> — they all simplify to the same y&nbsp;=&nbsp;mx&nbsp;+&nbsp;b.
          </p>
        </div>

        <button className="dbtn" onClick={()=>{if(!done.current){done.current=true;onDone();}}}
                style={{fontSize:17,padding:'14px 40px'}}>
          Got it — let me try! →
        </button>
      </div>
    </div>);
  }

  // ══════════════════════ LEVEL 4: FINAL CHALLENGE ═══════════════
  // 4 cookies on 2 lines. 2 shots, text entry only, no drag.
  // Cookies: A(100,250)  B(500,50)  C(500,200)  D(650,200)
  //   Line1: A+B  y = -0.5x + 300   (m=-1/2, b=300)
  //   Line2: C+D  y = 200            (m=0,    b=200)
  //   B & C share x=500 (the vertical-line hint)
  //   Wrong split A+D|B+C: B+C is vertical — impossible from maser
  //   Wrong split A+C|B+D: B+D needs b=-450 — impossible
  // => Unique valid solution.

  const L4_COOKIES=[
    {id:'A',mx:100,my:250},
    {id:'B',mx:500,my:50},
    {id:'C',mx:500,my:200},
    {id:'D',mx:650,my:200},
  ];
  // Solution lines
  const L4_LINES=[
    {m:-0.5,b:300,ids:['A','B']},
    {m:0,   b:200,ids:['C','D']},
  ];

  // Canvas for Level 4 — shows all 4 cookies, two independent beam lines
  function Canvas4({shot1,shot2,baked,hits1,hits2,fired1,fired2}){
    // Render both beams on same canvas
    const beam=(m,b,fired,hitIds,color)=>{
      const angle=Math.atan(m);
      const orig=m2s(0,b),ep=beamEnd(angle,b);
      return fired?<line key={color} className="beam-line" x1={orig.x} y1={orig.y} x2={ep.x} y2={ep.y}
        stroke={color} strokeWidth="2.5" strokeLinecap="round" style={{pointerEvents:'none'}}/> : null;
    };
    const guide=(m,b,color)=>{
      const angle=Math.atan(m);
      const orig=m2s(0,b),ep=beamEnd(angle,b);
      return<line x1={orig.x} y1={orig.y} x2={ep.x} y2={ep.y}
        stroke={color} strokeWidth="1.5" strokeDasharray="5 7" opacity=".45" style={{pointerEvents:'none'}}/>;
    };
    return(<div className="canvas-wrap">
      <svg viewBox={'0 0 '+CW+' '+CH} className="gsvg" style={{maxHeight:450}}>
        <ParkScene trees={[]} pfx="l4"/>
        <Grid/>
        {/* coordinate labels on all cookies */}
        {L4_COOKIES.map(c=>{const p=m2s(c.mx,c.my);return(
          <text key={'lbl'+c.id} x={p.x+(c.id==='A'?-52:14)} y={p.y+(c.id==='B'?18:-10)}
                fontSize="10" fill="#636366" fontFamily="monospace" fontWeight="600">({c.mx},{c.my})</text>
        );})}
        {/* dashed guides once angles are known */}
        {shot1.ready&&guide(shot1.m,shot1.b,'#0a84ff')}
        {shot2.ready&&guide(shot2.m,shot2.b,'#ff9f0a')}
        {/* maser icons */}
        {shot1.ready&&<MaserSVG angle={Math.atan(shot1.m)} dragging={false} b={shot1.b}/>}
        {/* fired beams */}
        {beam(shot1.m,shot1.b,fired1,hits1,'#0a84ff')}
        {beam(shot2.m,shot2.b,fired2,hits2,'#ff9f0a')}
        {/* cookies */}
        {L4_COOKIES.map(c=><CookieSVG key={c.id} mx={c.mx} my={c.my}
          baked={baked.has(c.id)} pop={hits1.has(c.id)||hits2.has(c.id)}
          showId={true} cid={'l4'+c.id}/>)}
        {/* sparks */}
        {fired1&&[...hits1].map(id=>{const c=L4_COOKIES.find(x=>x.id===id);return c?<Spark key={id+'1'} mx={c.mx} my={c.my}/>:null;})}
        {fired2&&[...hits2].map(id=>{const c=L4_COOKIES.find(x=>x.id===id);return c?<Spark key={id+'2'} mx={c.mx} my={c.my}/>:null;})}
      </svg>
    </div>);
  }

  function L4FinalSec({sRef,onDone,setLog}){
    const TOLS=0.015; // slope tolerance
    const TOLB=2;     // b tolerance
    // shot state: {m,b,ready} for each of 2 shots
    const[s1,setS1]=useState({m:null,b:null,ready:false});
    const[s2,setS2]=useState({m:null,b:null,ready:false});
    // Which shot is being entered: 1 or 2
    const[active,setActive]=useState(1);
    const[fired1,setFired1]=useState(false);
    const[fired2,setFired2]=useState(false);
    const[hits1,setHits1]=useState(new Set());
    const[hits2,setHits2]=useState(new Set());
    const[baked,setBaked]=useState(new Set());
    const[att,setAtt]=useState(0);
    const[msg,setMsg]=useState('');
    const[msgColor,setMsgColor]=useState('#3a3a3c');
    const[ok,setOk]=useState(false);
    const done=useRef(false);

    // Per-shot keypad state
    const[m1raw,setM1raw]=useState('');
    const[b1raw,setB1raw]=useState('');
    const[m2raw,setM2raw]=useState('');
    const[b2raw,setB2raw]=useState('');
    const[err1,setErr1]=useState('');
    const[err2,setErr2]=useState('');

    const parseFrac=s=>{
      const t=s.trim();
      if(!t)return null;
      if(t.includes('/')){const[n,d]=t.split('/');const v=parseFloat(n)/parseFloat(d);return isNaN(v)?null:v;}
      const v=parseFloat(t);return isNaN(v)?null:v;
    };

    const commitShot=(shotNum)=>{
      const mraw=shotNum===1?m1raw:m2raw;
      const braw=shotNum===1?b1raw:b2raw;
      const setErr=shotNum===1?setErr1:setErr2;
      const m=parseFrac(mraw), b=parseFrac(braw);
      if(m===null){setErr('Enter a slope m (e.g. -1/2 or 0)');return;}
      if(b===null){setErr('Enter a y-intercept b (e.g. 300)');return;}
      if(b<0||b>300){setErr('b must be between 0 and 300 (lift range)');return;}
      setErr('');
      if(shotNum===1)setS1({m,b,ready:true});
      else setS2({m,b,ready:true});
      setMsg('');
    };

    const fireShot=(shotNum, overrideM, overrideB)=>{
      const mVal = overrideM !== undefined ? overrideM : (shotNum===1?s1.m:s2.m);
      const bVal = overrideB !== undefined ? overrideB : (shotNum===1?s1.b:s2.b);
      if(mVal===null||bVal===null){setMsg('Set m and b for Shot '+shotNum+' first.');setMsgColor('#ff3b30');return;}
      const angle=Math.atan(mVal);
      const newHits=new Set();
      L4_COOKIES.forEach(c=>{
        if(!baked.has(c.id)&&rayHits(angle,c.mx,c.my,bVal))newHits.add(c.id);
      });
      if(shotNum===1){setFired1(true);setHits1(newHits);}
      else{setFired2(true);setHits2(newHits);}
      const newBaked=new Set([...baked,...newHits]);
      setBaked(newBaked);
      setAtt(a=>a+1);

      if(newBaked.size===4){
        setOk(true);
        setMsg('🎉 All four cookies baked in '+(att+1)+' shot'+(att===0?'':'s')+'! Perfect precision!');
        setMsgColor('#34c759');
        if(!done.current){done.current=true;onDone();};
      } else if(shotNum===2||(shotNum===1&&newHits.size===0&&att>=1)){
        const remaining=4-newBaked.size;
        if(remaining>0){
          setMsg(newHits.size===0?'Missed — check your equation. Reset and try again.'
            :'Got '+newHits.size+' cookie'+(newHits.size>1?'s':'')+'! '+(4-newBaked.size)+' remaining.');
          setMsgColor(newHits.size>0?'#ff9f0a':'#ff3b30');
        }
      } else if(newHits.size>0){
        setMsg('Shot 1: baked '+newHits.size+' cookie'+(newHits.size>1?'s':'')+'! Now set up Shot 2.');
        setMsgColor('#0a84ff');
        setActive(2);
      } else {
        setMsg('Shot 1 missed. You still have Shot 2 — or reset to try again.');
        setMsgColor('#ff9f0a');
      }
    };

    const reset=()=>{
      setS1({m:null,b:null,ready:false});setS2({m:null,b:null,ready:false});
      setFired1(false);setFired2(false);
      setHits1(new Set());setHits2(new Set());
      setBaked(new Set());setAtt(0);setMsg('');
      setM1raw('');setB1raw('');setM2raw('');setB2raw('');
      setErr1('');setErr2('');setActive(1);
    };

    const shotPanel=(num)=>{
      const isActive=active===num;
      const mraw=num===1?m1raw:m2raw;
      const braw=num===1?b1raw:b2raw;
      const setMraw=num===1?setM1raw:setM2raw;
      const setBraw=num===1?setB1raw:setB2raw;
      const err=num===1?err1:err2;
      const shot=num===1?s1:s2;
      const fired=num===1?fired1:fired2;
      const hits=num===1?hits1:hits2;
      const color=num===1?'#0a84ff':'#ff9f0a';
      const locked=num===2&&!fired1&&!s1.ready; // can't set shot 2 until shot 1 is ready

      return(<div style={{flex:1,minWidth:240,padding:'16px 18px',borderRadius:14,
                          border:'2px solid '+(isActive?color:'#e5e5ea'),
                          background:isActive?'#fafbff':'#f9f9fb',
                          opacity:locked?0.45:1,
                          transition:'border-color .2s, background .2s'}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:color,flexShrink:0}}/>
          <span style={{fontSize:13,fontWeight:700,color,letterSpacing:'.06em'}}>SHOT {num}</span>
          {fired&&<span style={{fontSize:12,color:'#8e8e93',marginLeft:'auto'}}>
            {hits.size>0?'✓ '+hits.size+' hit':'✗ missed'}
          </span>}
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <label style={{fontSize:13,color:'#636366',fontWeight:600,width:24,flexShrink:0}}>m =</label>
            <input value={mraw} onChange={e=>{setMraw(e.target.value);if(num===1)setErr1('');else setErr2('');}}
                   onKeyDown={e=>e.key==='Enter'&&commitShot(num)}
                   disabled={ok||locked}
                   placeholder="e.g. −1/2"
                   style={{flex:1,border:'1.5px solid '+(err&&!mraw?'#ff3b30':'#d1d1d6'),borderRadius:8,
                           padding:'9px 11px',fontSize:15,fontFamily:'monospace',outline:'none',
                           background:ok||locked?'#f2f2f7':'#fff'}}/>
          </div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <label style={{fontSize:13,color:'#636366',fontWeight:600,width:24,flexShrink:0}}>b =</label>
            <input value={braw} onChange={e=>{setBraw(e.target.value);if(num===1)setErr1('');else setErr2('');}}
                   onKeyDown={e=>e.key==='Enter'&&commitShot(num)}
                   disabled={ok||locked}
                   placeholder="e.g. 300"
                   style={{flex:1,border:'1.5px solid '+(err&&!braw?'#ff3b30':'#d1d1d6'),borderRadius:8,
                           padding:'9px 11px',fontSize:15,fontFamily:'monospace',outline:'none',
                           background:ok||locked?'#f2f2f7':'#fff'}}/>
          </div>
          {err&&<p style={{fontSize:12,color:'#ff3b30',margin:0}}>{err}</p>}
          {!fired&&!ok&&<div style={{display:'flex',gap:8,marginTop:4}}>
            <button className="nbtn" onClick={()=>{setActive(num);commitShot(num);}} disabled={ok||locked}
                    style={{flex:1,padding:'9px 0',fontSize:14}}>Set Line {num}</button>
            <button className="dbtn" onClick={()=>{
              setActive(num);
              const mVal=parseFrac(num===1?m1raw:m2raw);
              const bVal=parseFrac(num===1?b1raw:b2raw);
              const setErr=num===1?setErr1:setErr2;
              if(mVal===null){setErr('Enter slope m');return;}
              if(bVal===null){setErr('Enter y-intercept b');return;}
              if(bVal<0||bVal>300){setErr('b must be 0–300');return;}
              setErr('');
              if(num===1)setS1({m:mVal,b:bVal,ready:true});
              else setS2({m:mVal,b:bVal,ready:true});
              fireShot(num,mVal,bVal);
            }} disabled={ok||locked}
                    style={{flex:1,padding:'9px 0',fontSize:14}}>Fire ⚡</button>
          </div>}
          {shot.ready&&!fired&&<div style={{fontSize:12,color:'#8e8e93',fontFamily:'monospace',marginTop:2}}>
            y = {shot.m}x {shot.b>=0?'+ '+shot.b:'− '+Math.abs(shot.b)} — ready to fire
          </div>}
        </div>
      </div>);
    };

    return(<div ref={sRef} className="sec" style={{position:'relative'}}>
      <div style={{textAlign:'center',marginBottom:20,maxWidth:700,width:'100%'}}>
        <div className="pill" style={{display:'inline-block',marginBottom:10}}>Level 4 · Final Challenge</div>
        <h2 className="serif" style={{fontSize:'clamp(22px,4vw,38px)',fontWeight:400,color:'#1c1c1e',margin:'0 0 10px',letterSpacing:'-.02em'}}>Four Cookies, Two Shots</h2>
        <p style={{color:'#636366',fontSize:16,lineHeight:1.65,margin:0}}>
          Four cookies. Two separate lines. No dragging — pure algebra. Figure out which cookies share a line, find m and b for each, and bake them all in exactly 2 shots.
        </p>
      </div>

      {/* Hint callout */}
      <div style={{background:'#fffbeb',border:'1.5px solid #fde68a',borderRadius:12,padding:'12px 18px',
                   marginBottom:16,maxWidth:620,width:'100%',fontSize:14,color:'#92400e',lineHeight:1.6}}>
        <strong>Hint:</strong> Two cookies share the same x-coordinate. A vertical line through them can't be fired from the maser — so they must lie on <em>different</em> lines.
        Not all pairings produce a beam that fits within the window's constraints.
      </div>

      <Canvas4 shot1={s1} shot2={s2} baked={baked} hits1={hits1} hits2={hits2} fired1={fired1} fired2={fired2}/>

      {/* Shot panels */}
      <div style={{display:'flex',gap:14,flexWrap:'wrap',width:'100%',maxWidth:620,marginTop:16,justifyContent:'center'}}>
        {shotPanel(1)}
        {shotPanel(2)}
      </div>

      {/* Feedback */}
      {msg&&<div style={{marginTop:14,padding:'12px 20px',borderRadius:12,background:msgColor==='#34c759'?'#ecfdf5':msgColor==='#ff3b30'?'#fff1f2':'#f0f9ff',
                         border:'1.5px solid '+(msgColor==='#34c759'?'#86efac':msgColor==='#ff3b30'?'#fecaca':'#bae6fd'),
                         fontSize:15,color:msgColor,fontWeight:500,maxWidth:560,textAlign:'center'}}>
        {msg}
      </div>}

      {/* Attempts + reset */}
      {att>0&&!ok&&<div style={{display:'flex',gap:12,alignItems:'center',marginTop:12}}>
        <span style={{fontSize:13,color:'#c7c7cc'}}>{att} shot{att!==1?'s':''} fired</span>
        <button className="gbtn" onClick={reset} style={{fontSize:14,padding:'8px 18px'}}>Reset</button>
      </div>}
    </div>);
  }

  function ProgBar({done,total}){
    const p=Math.round(done/Math.max(total,1)*100);
    return(<div style={{position:'fixed',top:0,left:0,width:'100%',zIndex:100,height:3,background:'#f2f2f7'}}>
      <div style={{height:'100%',borderRadius:'0 2px 2px 0',background:'linear-gradient(90deg,#0a84ff,#34aadc)',width:p+'%',transition:'width .6s ease-out'}}/>
    </div>);
  }

  function DoneSec({sRef}){
    return(<div ref={sRef} className="sec secctr">
      <div style={{textAlign:'center',maxWidth:540}}>
        <div style={{fontSize:64,marginBottom:20}}>🍪</div>
        <h2 className="serif" style={{fontSize:'clamp(28px,5vw,48px)',fontWeight:400,color:'#1c1c1e',margin:'0 0 16px',letterSpacing:'-.02em'}}>Levels 1–4 Complete!</h2>
        <p style={{color:'#636366',fontSize:16,lineHeight:1.65,margin:'0 0 32px'}}>You've mastered slope intuition, the y-intercept, negative slope, algebraic targeting, point-slope form, slope-intercept form, and multi-line reasoning. The maser is fully operational. 🎯</p>
        <div style={{background:'linear-gradient(135deg,#e8faf0,#d4f5e4)',border:'1.5px solid #a3e6be',borderRadius:20,padding:'28px 32px',textAlign:'left'}}>
          <div style={{fontWeight:700,fontSize:16,color:'#1c5c35',marginBottom:14}}>Skills unlocked:</div>
          {[
            {icon:'📐','skill':'Slope from two points — Δy/Δx'},
            {icon:'🔢','skill':'Slope-intercept form — y = mx + b'},
            {icon:'📍','skill':'Point-slope form — y − y₁ = m(x − x₁)'},
            {icon:'🤖','skill':'Algebraic precision targeting'},
          ].map(({icon,skill},i)=><div key={i} style={{display:'flex',gap:10,alignItems:'center',marginBottom:10,fontSize:15,color:'#2d7a4b'}}>
            <span style={{fontSize:20}}>{icon}</span><span>{skill}</span>
          </div>)}
        </div>
      </div>
    </div>);
  }

  const App=()=>{
    const[done,setDone]=useState(new Set());
    const[log,setLog]=useState({currentSection:'1.1',answersLog:[]});
    const[nextReady,setNextReady]=useState(null); // index of next unlocked section
    const[nextMsg,setNextMsg]=useState('');
    const refs=useRef(ALL.map(()=>React.createRef()));
    const complete=useCallback((id,idx,msg)=>{
      setDone(p=>{const s=new Set(p);s.add(id);return s;});
      const ni=idx+1,nid=ALL[ni]?.id;
      if(nid){setLog(p=>({...p,currentSection:nid}));setNextReady(ni);setNextMsg(msg||'Keep going!');}
    },[]);
    const scrollToNext=useCallback(()=>{
      if(nextReady==null)return;
      refs.current[nextReady]?.current?.scrollIntoView({behavior:'smooth',block:'start'});
      setNextReady(null);setNextMsg('');
    },[nextReady]);
    return(<div style={{background:'#fff',minHeight:'100vh'}}>
      <div style={{textAlign:'center',padding:'52px 24px 8px',borderBottom:'1px solid #f2f2f7'}}>
        <p style={{fontSize:13,fontWeight:600,color:'#aeaeb2',letterSpacing:'.1em',textTransform:'uppercase',margin:'0 0 8px'}}>Interactive</p>
        <h1 className="serif" style={{fontSize:'clamp(28px,5vw,52px)',fontWeight:400,color:'#1c1c1e',margin:0,letterSpacing:'-.03em',lineHeight:1.1}}>Equations of Lines</h1>
      </div>
      <ProgBar done={done.size} total={ALL.length-1}/>
      {nextReady!=null&&<button onClick={scrollToNext} aria-label="Scroll to next section"
        style={{position:'fixed',bottom:32,left:'50%',transform:'translateX(-50%)',
                zIndex:200,background:'#0a84ff',border:'none',borderRadius:32,
                padding:'0 20px 0 16px',height:52,cursor:'pointer',display:'flex',
                alignItems:'center',gap:10,
                boxShadow:'0 4px 24px rgba(10,132,255,.5)',
                animation:'arrowBounce 1.2s ease-in-out infinite',whiteSpace:'nowrap'}}>
        <span style={{fontSize:15,fontWeight:600,color:'#fff',letterSpacing:'-.01em'}}>{nextMsg}</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>}
      {ALL.map((s,i)=>{
        const ref=refs.current[i];
        const cp={key:s.id,sRef:ref,onDone:(msg)=>complete(s.id,i,msg),setLog};
        if(!s.type||s.type==='game') return<GameSec {...cp} sec={s}/>;
        if(s.type==='slope-explorer') return<SlopeExplorer {...cp}/>;
        if(s.type==='kc')            return<KCSec {...cp} sec={s}/>;
        if(s.type==='l2sub')         return<L2SubSec {...cp} subId={s.subId}/>;
        if(s.type==='l3sub')         return<L3SubSec {...cp} subId={s.subId}/>;
        if(s.type==='l3teach')       return<L3TeachSec {...cp}/>;
        if(s.type==='l4final')       return<L4FinalSec {...cp}/>;
        if(s.type==='done')          return<DoneSec key={s.id} sRef={ref}/>;
        return null;
      })}
    </div>);
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
