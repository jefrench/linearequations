<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Cookie Invasion</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
*{box-sizing:border-box}body{font-family:'DM Sans',sans-serif;background:#fff;margin:0;overflow-x:hidden}
::-webkit-scrollbar{display:none}*{-ms-overflow-style:none;scrollbar-width:none}
.serif{font-family:'DM Serif Display',Georgia,serif}
@keyframes beamDraw{from{stroke-dashoffset:1400}to{stroke-dashoffset:0}}
.beam-line{stroke-dasharray:1400;stroke-dashoffset:1400;animation:beamDraw .45s cubic-bezier(.22,1,.36,1) forwards}
@keyframes cPop{0%{filter:brightness(1)}40%{filter:brightness(2.2)}100%{filter:brightness(1)}}
.cpop{animation:cPop .5s ease forwards}
@keyframes fup{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fup{animation:fup .5s ease forwards}
@keyframes hPulse{0%,100%{opacity:.35}50%{opacity:.1}}
.hpulse{animation:hPulse 1.8s ease-in-out infinite}
@keyframes sp{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.6)}}
.spark{animation:sp .5s ease forwards}
@keyframes rrIn{from{opacity:0}to{opacity:1}}
.rr{animation:rrIn .6s .3s ease forwards;opacity:0}
@keyframes yIn{from{stroke-dashoffset:500;opacity:0}to{stroke-dashoffset:0;opacity:.85}}
.yline{stroke-dasharray:500;stroke-dashoffset:500;animation:yIn .7s .15s ease forwards}
@keyframes bGl{0%,100%{color:#0a84ff;text-shadow:0 0 8px rgba(10,132,255,.4)}50%{color:#5ac8fa;text-shadow:0 0 18px rgba(90,200,250,.7)}}
.bglow{animation:bGl 1.5s ease-in-out infinite}
@keyframes liftGlow{0%,100%{filter:drop-shadow(0 0 4px #f97316) drop-shadow(0 0 8px rgba(249,115,22,.5))}50%{filter:drop-shadow(0 0 8px #fdba74) drop-shadow(0 0 16px rgba(253,186,116,.7))}}
@keyframes agB{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.agbounce{animation:agB 2.2s ease-in-out infinite}
@keyframes bubIn{from{opacity:0;transform:scale(.85) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.bubin{animation:bubIn .28s ease forwards}
.canvas-wrap{border-radius:18px;overflow:hidden;box-shadow:0 2px 32px rgba(0,0,0,.07),0 1px 6px rgba(0,0,0,.05);width:100%;max-width:780px}
.gsvg{cursor:crosshair;user-select:none;-webkit-user-select:none;display:block;width:100%;touch-action:none}
.gsvg.drag{cursor:grabbing}
.dbtn{background:#1c1c1e;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:500;padding:16px 38px;cursor:pointer;transition:transform .12s,background .2s,box-shadow .2s;box-shadow:0 2px 14px rgba(0,0,0,.18);font-family:'DM Sans',sans-serif}
.dbtn:hover{background:#2c2c2e;transform:translateY(-1px);box-shadow:0 4px 22px rgba(0,0,0,.22)}
.dbtn:active{transform:scale(.97)}.dbtn:disabled{background:#c7c7cc;box-shadow:none;cursor:default;transform:none}
.gbtn{background:transparent;color:#636366;border:1.5px solid #d1d1d6;border-radius:10px;font-size:16px;padding:11px 24px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:border-color .15s,color .15s}
.gbtn:hover{border-color:#8e8e93;color:#1c1c1e}
.nbtn{background:#0a84ff;color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:500;padding:15px 34px;cursor:pointer;font-family:'DM Sans',sans-serif;box-shadow:0 2px 14px rgba(10,132,255,.3);transition:transform .12s,box-shadow .2s}
.nbtn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(10,132,255,.4)}
.eqchip{background:#f2f2f7;border-radius:8px;padding:6px 14px;font-size:16px;font-weight:500;color:#1c1c1e;font-variant-numeric:tabular-nums}
.pill{background:#f2f2f7;border-radius:100px;padding:4px 13px;font-size:12px;color:#636366;font-weight:500;letter-spacing:.04em;text-transform:uppercase}
.hcard{background:#f9f9fb;border-radius:12px;padding:14px 18px;font-size:15px;color:#3a3a3c;line-height:1.6;max-width:480px;text-align:center}
.scard{background:linear-gradient(135deg,#e8faf0,#d4f5e4);border:1.5px solid #a3e6be;border-radius:18px;padding:22px 30px;text-align:center;max-width:480px;width:100%}
.mcard{background:#fff4f4;border:1.5px solid #ffd2d2;border-radius:14px;padding:16px 22px;text-align:center;max-width:440px}
.pcard{background:#fffbea;border:1.5px solid #ffe08a;border-radius:14px;padding:16px 22px;text-align:center;max-width:440px}
.blkcard{background:#fff8ee;border:1.5px solid #ffcc66;border-radius:14px;padding:16px 22px;text-align:center;max-width:440px}
.mnote{background:#f9f9fb;border-radius:14px;padding:18px 22px;border-left:3px solid #d1d1d6;max-width:540px;width:100%}
.defcard{background:#f9f9fb;border-radius:16px;padding:24px 28px;border-left:3px solid #0a84ff}
.wcard{background:#fff;border-radius:16px;padding:24px 28px;border:1.5px solid #e5e5ea}
.qcard{background:#fff;border-radius:16px;padding:24px 28px;border:1.5px solid #e5e5ea}
.icard{background:#f0f4ff;border-radius:16px;padding:24px 28px;border:1.5px solid #c7d2fe}
.cb{background:#f2f2f7;border-radius:8px;padding:12px 16px;font-family:'SF Mono','Fira Code',monospace;font-size:15px;color:#1c1c1e;line-height:1.9}
.phcard{background:#faf9ff;border-radius:18px;padding:30px 34px;border:1.5px dashed #c7d2fe;max-width:580px;width:100%;text-align:center}
.mcbtn{border-radius:12px;border:1.5px solid #e5e5ea;background:#fff;padding:12px 20px;font-size:16px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;min-width:82px}
.mcbtn:hover:not(:disabled){border-color:#0a84ff;background:#f0f7ff}
.mcbtn.ok{background:#e8faf0;border-color:#34c759;color:#1c5c35}
.mcbtn.no{background:#fff4f4;border-color:#ff3b30;color:#9b1c1c}
.mcbtn.dim{background:#f9f9fb;color:#aeaeb2;border-color:#e5e5ea}
.kco{border:2px solid #e5e5ea;border-radius:16px;background:#fff;padding:18px 14px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;font-family:'DM Sans',sans-serif}
.kco:hover:not(:disabled){border-color:#0a84ff;background:#f0f7ff;transform:translateY(-2px)}
.kco.ok{border-color:#34c759;background:#e8faf0}.kco.no{border-color:#ff3b30;background:#fff4f4}.kco.dim{opacity:.45}
.sec{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:clamp(70px,9vw,90px) clamp(16px,4vw,32px) 80px;border-bottom:1px solid #f2f2f7}
.secctr{justify-content:center}
.hud{background:rgba(28,28,30,.88);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-radius:14px;padding:13px 22px;display:flex;align-items:center;gap:14px;border:1px solid rgba(255,255,255,.1)}
.lifthint{background:#f0f7ff;border:1.5px solid #bae0ff;border-radius:10px;padding:9px 16px;font-size:14px;color:#0a84ff;text-align:center}
.tgbtn{position:fixed;bottom:18px;right:18px;z-index:200;width:64px;height:85px;border-radius:0;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;padding:0}
.tgbtn:hover{transform:scale(1.08) translateY(-2px)}.tgpop{position:fixed;bottom:110px;right:18px;z-index:200;width:290px;background:#fff;border-radius:20px;box-shadow:0 8px 44px rgba(0,0,0,.14);padding:22px;border:1.5px solid #e5e5ea}
  @keyframes arrowBounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(7px)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const {useState,useEffect,useRef,useCallback}=React;

  // Coordinate system: m2s(mx,my) -> SVG px. Math-y UP, SVG-y DOWN.
  const CW=800,CH=440,OX=60,OY=400,CR=17;
  const m2s=(mx,my)=>({x:OX+mx,y:OY-my});

  function beamEnd(angle,b=0){
    const cos=Math.cos(angle),sin=Math.sin(angle);
    const sx=OX,sy=OY-b;
    let t=1e9;
    if(cos> .001)t=Math.min(t,(CW-sx)/cos);
    if(cos<-.001)t=Math.min(t,sx/(-cos));
    if(sin> .001)t=Math.min(t,sy/sin);
    if(sin<-.001)t=Math.min(t,(CH-sy)/(-sin));
    if(!isFinite(t))t=CW;
    return{x:sx+t*cos,y:sy-t*sin};
  }
  function rayHits(angle,mx,my,b=0){
    const cos=Math.cos(angle),sin=Math.sin(angle);
    const dy=my-b;
    if(mx*cos+dy*sin<0)return false;
    return Math.abs(mx*sin-dy*cos)<=CR;
  }
function beamBlocked(angle,b,obs){
    const tan=Math.tan(angle);
    const yLeft = tan*obs.mx+b;
    const yRight = tan*(obs.mx+obs.width)+b;
    
    // If the beam is entirely above the obstacle at both edges, it clears it safely
    if (yLeft > obs.height && yRight > obs.height) return false;
    // If the beam is entirely below the ground (impossible in our game, but good math practice)
    if (yLeft < 0 && yRight < 0) return false;
    
    // Otherwise, the infinite line intersects the bounding box of the obstacle
    return true;
  }
  
  function blockedPt(angle,b,obs){
    const tan=Math.tan(angle);
    const yLeft=tan*obs.mx+b;
    // If it hit the front face
    if(yLeft>=0 && yLeft<=obs.height) return {x:OX+obs.mx, y:OY-yLeft};
    // If it hit the top face (came from above)
    if(yLeft > obs.height) return {x:OX + ((obs.height-b)/tan), y:OY-obs.height};
    // Fallback for back face
    return {x:OX+obs.mx+obs.width, y:OY-(tan*(obs.mx+obs.width)+b)};
  }

  // ── Level-1 config ─────────────────────────────────────────────
  const SEC=[
    {id:'1.1',pill:'Level 1 \u00b7 Intuition',title:'Cookie Invasion',
     desc:null,  // rendered custom in GameSec for 1.1
     cookies:[{id:'A',mx:560,my:225}],trees:[{mx:520,h:220}],riseRun:false,
     hint:c=>'Cookie is in the tree at ('+c.mx+', '+c.my+'). Maser sits at origin (0, 0). Aim!',
     okTitle:'Cookie baked!',okBody:s=>'Beam: y = '+s+'x  \u2014  slope m = tan(\u03b8) = '+s+'.',
     hintAngle:'~22\u00b0',hintAfter:2,maserEgg:true},
    {id:'1.2',pill:'Level 1 \u00b7 The Ratio',title:'Three Rogue Cookies!',
     desc:'Three cookies appeared. One beam bakes all three \u2014 if your slope is exactly right.',
     cookies:[{id:'A',mx:300,my:100},{id:'B',mx:450,my:150},{id:'C',mx:600,my:200}],
     trees:[{mx:270,h:200},{mx:570,h:240}],riseRun:true,
     hint:()=>'Cookies at (300,100), (450,150), (600,200). They are collinear \u2014 one line hits all three!',
     okTitle:'All three baked!',okBody:()=>'Rise \u0394y=50, run \u0394x=150 between each pair \u2192 m = 1/3.',
     hintAngle:'~18\u00b0',hintAfter:2},
    {id:'1.2.1',type:'slope-explorer'},
    {id:'1.3',pill:'Level 1 \u00b7 Zero Slope',title:'Ground-Level Cookie',
     desc:'This cookie sits on the ground. A horizontal beam has zero vertical rise.',
     cookies:[{id:'A',mx:500,my:0}],trees:[],riseRun:false,
     hint:()=>'Cookie at (500, 0). Slope 0 means a perfectly horizontal beam.',
     okTitle:'Zero slope!',okBody:()=>'Horizontal line: m = 0. \u0394y = 0 \u2192 m = 0 \u00f7 \u0394x = 0.',
     hintAngle:'~0\u00b0',hintAfter:2},
    {id:'1.4',pill:'Level 1 \u00b7 Steepness',title:'Sky-High Cookie',
     desc:"This cookie is very high up. You'll need a steep beam with a large slope.",
     cookies:[{id:'A',mx:300,my:340}],trees:[{mx:265,h:360}],riseRun:false,
     hint:()=>'Cookie at (300, 340). How steep must the line be?',
     okTitle:'Steep slope!',okBody:s=>'m = '+s+'. Steeper lines have larger m.',
     hintAngle:'~49\u00b0',hintAfter:2},
    {id:'kc1',type:'kc',pill:'Knowledge Check',
     q:'Which beam has Zero Slope?',
     soc:'Zero slope = no rise and no fall. Which beam is completely flat?',
     opts:[{id:'A',a:0},{id:'B',a:Math.PI/10},{id:'C',a:Math.PI/4},{id:'D',a:Math.PI/3}],cor:'A'},
    {id:'kc2',type:'kc',pill:'Knowledge Check',
     q:'Which beam has the Largest Slope?',
     soc:'Slope = rise / run. Which beam rises most per unit of horizontal travel?',
     opts:[{id:'A',a:Math.PI/12},{id:'B',a:Math.PI/5},{id:'C',a:Math.PI/4},{id:'D',a:5*Math.PI/12}],cor:'D'},
    {id:'l2.1',type:'l2sub',subId:'2.1'},
    {id:'l2.2',type:'l2sub',subId:'2.2'},
    {id:'l2.3',type:'l2sub',subId:'2.3'},
    {id:'l2.4',type:'l2sub',subId:'2.4'},
    {id:'kc.neg',type:'kc',pill:'Knowledge Check',
     q:'Which beam has a Negative Slope?',
     soc:'Negative slope: beam tilts downward from left to right. Which one falls as it moves right?',
     opts:[{id:'A',a:0},{id:'B',a:Math.PI/4},{id:'C',a:-Math.PI/4},{id:'D',a:Math.PI/2*.95}],cor:'C'},
  ];
  const ALL=[...SEC,
    {id:'l3.1',type:'l3sub',subId:'3.1'},
    {id:'l3.2',type:'l3sub',subId:'3.2'},
    {id:'l3.3',type:'l3sub',subId:'3.3'},
    {id:'l3.teach',type:'l3teach'},
    {id:'l3.4',type:'l3sub',subId:'3.4'},
    {id:'l3.5',type:'l3sub',subId:'3.5'},
    {id:'l3.6',type:'l3sub',subId:'3.6'},
    {id:'l4.final',type:'l4final'},
    {id:'done',type:'done'}
  ];

  // ── Level-2 sub-levels (4 steps through y-intercept concept) ──
  // 2.1: angle locked, pure lift only
  // 2.2: must use NEGATIVE slope + high lift
  // 2.3: positive slope + lift combo
  // 2.4: two cookies, no obstacles
  const L2S={
    '2.1':{pill:'Level 2 \u00b7 Y-Intercept',title:'The Scissor Lift',
      desc:'A cookie hides behind a park bench. The beam angle is locked horizontal. Drag the LEFT side of the canvas UP to raise the maser beam over the bench!',
      cookies:[{id:'A',mx:500,my:105}],obs:[{mx:150,width:40,height:100}],trees:[{mx:460,h:245}],
      lock:true,neg:false,b0:0,a0:0,
      hint:'Angle is locked at 0. Drag the LEFT side of the canvas upward to raise the lift.',hintAfter:1,
      okT:'Cleared it!',okB:b=>'Lift raised the beam to y = '+Math.round(b)+'. Every point on the beam gained +'+Math.round(b)+' in height!',
      yReveal:true,agOk:"See that? By lifting the maser you added a constant y-value to the entire beam! That starting height is the y-intercept \u2014 the '+ b' in y = mx + b."},
    '2.2':{pill:'Level 2 \u00b7 Negative Slope',title:'Tilt it Down!',
      desc:'A cookie is hiding on the far side of the bench. Lift the maser beam HIGH to clear the bench, then tilt the barrel DOWNWARD so the beam angles back down to the cookie.',
      cookies:[{id:'A',mx:500,my:15}],obs:[{mx:150,width:40,height:100}],trees:[],
      lock:false,neg:true,b0:0,a0:Math.PI/8,
      hint:'Raise the lift above the bench height, then drag the barrel below horizontal for a negative slope.',hintAfter:2,
      okT:'Negative slope mastered!',okB:(b,m)=>'Beam: y = '+m+'x + '+Math.round(b)+'. Negative slope: beam falls from left to right.',
      negTeach:true},
    '2.3':{pill:'Level 2 \u00b7 Aim & Lift',title:'Aim and Lift',
      desc:'Both controls are unlocked. Combine slope and y-intercept to hit the cookie behind the tall obstacle.',
      cookies:[{id:'A',mx:600,my:250}],obs:[{mx:300,width:50,height:180}],trees:[],
      lock:false,neg:true,b0:0,a0:Math.PI/8,
      hint:'y = m * x + b. You need both the right slope AND enough lift to clear the can.',hintAfter:2,
      okT:'Direct hit!',okB:(b,m)=>'Beam: y = '+m+'x + '+Math.round(b)+'. Slope sets the angle, b gets you over the obstacle!'},
    '2.4':{pill:'Level 2 \u00b7 Two Cookies',title:'Two Cookies, One Beam',
      desc:'No obstacles. Find the exact line y = mx + b that passes through BOTH cookies simultaneously.',
      cookies:[{id:'A',mx:200,my:200},{id:'B',mx:500,my:350}],obs:[],trees:[{mx:165,h:295},{mx:460,h:370}],
      lock:false,neg:true,b0:0,a0:Math.PI/8,
      hint:'Cookies at (200, 200) and (500, 350). Both must lie on the same line.',hintAfter:2,
      okT:'Both baked!',okB:(b,m)=>'Line: y = '+m+'x + '+Math.round(b)+'. Slope between cookies = (350-200)/(500-200) = 1/2.'},
  };
  const L2O=['2.1','2.2','2.3','2.4'];

  // ════════════════════════════ SVG PARTS ════════════════════════

  function ParkScene({trees=[],pfx='p'}){
    const blds=[
      {x:90,ty:202,w:56,rows:3,cols:2,wW:12,wH:14,hP:10,vP:12,hG:8,vG:8},
      {x:210,ty:188,w:50,rows:4,cols:2,wW:10,wH:13,hP:9,vP:11,hG:7,vG:7},
      {x:664,ty:218,w:82,rows:3,cols:3,wW:13,wH:14,hP:10,vP:11,hG:6,vG:7},
    ];
    return(<g>
      <defs>
        <linearGradient id={pfx+'sk'} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#eef2ff"/><stop offset="100%" stopColor="#fafaf8"/>
        </linearGradient>
        <linearGradient id={pfx+'gr'} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#d4edda"/><stop offset="100%" stopColor="#b8dfc4"/>
        </linearGradient>
        {blds.map((b,i)=><clipPath key={i} id={pfx+'c'+i}><rect x={b.x} y={b.ty} width={b.w} height={OY-b.ty}/></clipPath>)}
      </defs>
      <rect x="0" y="0" width={CW} height={CH} fill={'url(#'+pfx+'sk)'}/>
      {blds.map((b,i)=>{
        const bh=OY-b.ty,wins=[];
        for(let r=0;r<b.rows;r++)for(let c=0;c<b.cols;c++)
          wins.push({x:b.x+b.hP+c*(b.wW+b.hG),y:b.ty+b.vP+r*(b.wH+b.vG)});
        return(<g key={i}>
          <rect x={b.x} y={b.ty} width={b.w} height={bh} fill="none" stroke="#c8ccd4" strokeWidth="1.2"/>
          <g clipPath={'url(#'+pfx+'c'+i+')'}>
            {wins.map((w,j)=><rect key={j} x={w.x} y={w.y} width={b.wW} height={b.wH} fill="none" stroke="#c8ccd4" strokeWidth="0.8"/>)}
            {i===0&&<line x1={b.x} y1={b.ty+bh*.45} x2={b.x+b.w} y2={b.ty+bh*.45} stroke="#c8ccd4" strokeWidth="0.7"/>}
          </g>
        </g>);
      })}
      <rect x="0" y={OY} width={CW} height={CH-OY} fill={'url(#'+pfx+'gr)'}/>
      {[65,110,165,225,295,385,475,565,645,715,765].map((gx,i)=>(
        <line key={i} x1={gx} y1={OY} x2={gx+4} y2={OY-7} stroke="#a8d5b5" strokeWidth="1.2" strokeLinecap="round"/>
      ))}
      <line x1="0" y1={OY} x2={CW} y2={OY} stroke="#8aba97" strokeWidth="1.5"/>
      {trees.map((t,i)=><TreeSVG key={i} mx={t.mx} h={t.h}/>)}
    </g>);
  }

  function TreeSVG({mx,h}){
    const b=m2s(mx,0),t=m2s(mx,h),cr=Math.min(70,h*.27);
    return(<g>
      <line x1={b.x} y1={b.y} x2={t.x} y2={t.y} stroke="#7c5c3a" strokeWidth="6" strokeLinecap="round"/>
      <line x1={m2s(mx,h*.6).x} y1={m2s(mx,h*.6).y} x2={m2s(mx-42,h*.74).x} y2={m2s(mx-42,h*.74).y} stroke="#7c5c3a" strokeWidth="3.5" strokeLinecap="round"/>
      <line x1={m2s(mx,h*.7).x} y1={m2s(mx,h*.7).y} x2={m2s(mx+38,h*.82).x} y2={m2s(mx+38,h*.82).y} stroke="#7c5c3a" strokeWidth="3" strokeLinecap="round"/>
      <circle cx={t.x-22} cy={t.y-10} r={cr*.76} fill="#c8e6c0" stroke="#9dcf9a" strokeWidth="1.2" opacity=".85"/>
      <circle cx={t.x+20} cy={t.y-14} r={cr*.69} fill="#b8ddb0" stroke="#9dcf9a" strokeWidth="1.2" opacity=".85"/>
      <circle cx={t.x}    cy={t.y-26} r={cr}      fill="#c4e4bb" stroke="#9dcf9a" strokeWidth="1.2" opacity=".9"/>
    </g>);
  }

  function CookieSVG({mx,my,baked,pop,showId,cid}){
    const{x:cx,y:cy}=m2s(mx,my);
    const chips=[{dx:-5,dy:-5},{dx:5,dy:-6},{dx:0,dy:4},{dx:-7,dy:3},{dx:7,dy:2},{dx:2,dy:-1}];
    return(<g transform={'translate('+cx+','+cy+')'}>
      <ellipse cx="1" cy="16" rx="13" ry="3.5" fill="rgba(0,0,0,0.08)"/>
      <circle className={pop?'cpop':''} r="14" fill={baked?'#C68642':'#F5DEB3'} stroke="#c4a47a" strokeWidth="1.2"/>
      <clipPath id={'cc_'+cid}><circle r="11"/></clipPath>
      <g clipPath={'url(#cc_'+cid+')'}>
        {chips.map((c,i)=><ellipse key={i} cx={c.dx} cy={c.dy} rx="2.4" ry="1.9" fill="#3d2200" opacity=".88" transform={'rotate('+(i*30)+')'}/>)}
      </g>
      <circle cx="-4" cy="-5" r="3.5" fill="white" opacity=".18"/>
      {showId&&<text y="28" textAnchor="middle" fontSize="9" fill="#8e8e93" fontFamily="monospace">{cid.slice(-1)}</text>}
    </g>);
  }

  function MaserSVG({angle,dragging,b=0,showHandle=true}){
    const{x:bx,y:by}=m2s(0,b);
    const ex=bx+Math.cos(angle)*32,ey=by-Math.sin(angle)*32;
    // Drag handle sits far out along the beam — well away from the scissor lift zone
    const hx=bx+Math.cos(angle)*130,hy=by-Math.sin(angle)*130;
    return(<g>
      <rect x={bx-14} y={by-12} width="28" height="24" rx="5" fill="#1c1c1e" stroke="#48484a" strokeWidth="1.2"/>
      {[-4,0,4].map((v,i)=><line key={i} x1={bx-9} y1={by+v} x2={bx-3} y2={by+v} stroke="#636366" strokeWidth="1"/>)}
      <circle cx={bx+10} cy={by} r="6" fill="#0a84ff" opacity=".22" stroke="#0a84ff" strokeWidth="1.5"/>
      <circle cx={bx+10} cy={by} r="3" fill="#0a84ff" opacity=".78"/>
      <line x1={bx+10} y1={by} x2={ex} y2={ey} stroke="#636366" strokeWidth="4.5" strokeLinecap="round"/>
      <circle cx={ex} cy={ey} r="3.5" fill="#0a84ff" opacity=".88"/>
      {/* Drag handle — only shown when angle dragging is enabled */}
      {showHandle&&<>
        {!dragging&&<circle className="hpulse" cx={hx} cy={hy} r="20" fill="#0a84ff" style={{pointerEvents:'none'}}/>}
        <circle cx={hx} cy={hy} r="6" fill="#0a84ff" opacity=".9"/>
        <line x1={hx-5} y1={hy} x2={hx+5} y2={hy} stroke="white" strokeWidth="1.5" opacity=".8"/>
        <line x1={hx}   y1={hy-5} x2={hx}   y2={hy+5} stroke="white" strokeWidth="1.5" opacity=".8"/>
      </>}
      <text x={bx-8} y={by+28} fontSize="9" fill="#aeaeb2" fontFamily="monospace">{b>0?'(0,'+Math.round(b)+')':'(0,0)'}</text>
    </g>);
  }

  function RiseRun(){
    const A=m2s(300,100),K=m2s(450,100),B=m2s(450,150);
    return(<g className="rr" style={{pointerEvents:'none'}}>
      <line x1={A.x} y1={A.y} x2={K.x} y2={K.y} stroke="#0a84ff" strokeWidth="1.8" strokeDasharray="5 4" opacity=".8"/>
      <line x1={K.x} y1={K.y} x2={B.x} y2={B.y} stroke="#34c759" strokeWidth="1.8" strokeDasharray="5 4" opacity=".8"/>

      <text x={K.x+8} y={(K.y+B.y)/2+4} fontSize="10" fill="#34c759" fontFamily="monospace" fontWeight="600">rise=50</text>
      <circle cx={K.x} cy={K.y} r="3" fill="#aeaeb2" opacity=".7"/>

  function Spark({mx,my}){
    const{x:cx,y:cy}=m2s(mx,my);
    return(<g className="spark" style={{pointerEvents:'none'}}>
      {Array.from({length:8},(_,i)=>{
        const a=i/8*2*Math.PI;
        return<line key={i} x1={cx+Math.cos(a)*10} y1={cy+Math.sin(a)*10} x2={cx+Math.cos(a)*22} y2={cy+Math.sin(a)*22} stroke="#ff9f0a" strokeWidth="2.2" strokeLinecap="round" opacity=".9"/>;
      })}
    </g>);
  }

  function Grid(){
    const els=[];
    for(let mx=0;mx<=740;mx+=100){
      const s=m2s(mx,0);
      els.push(<line key={'v'+mx} x1={s.x} y1={0} x2={s.x} y2={CH} stroke="#dde" strokeWidth=".5" strokeDasharray="3 5"/>);
      if(mx>0)els.push(<text key={'vl'+mx} x={s.x} y={OY-5} fontSize="8" fill="#c4c4d4" textAnchor="middle" fontFamily="monospace">{mx}</text>);
    }
    for(let my=0;my<=380;my+=100){
      const s=m2s(0,my);
      els.push(<line key={'h'+my} x1={0} y1={s.y} x2={CW} y2={s.y} stroke="#dde" strokeWidth=".5" strokeDasharray="3 5"/>);
      if(my>0)els.push(<text key={'hl'+my} x={12} y={s.y-3} fontSize="8" fill="#c4c4d4" fontFamily="monospace">{my}</text>);
    }
    return<g opacity=".7" style={{pointerEvents:'none'}}>{els}</g>;
  }

  function ParkBench({mx,width,height,blocked}){
    const{x:bx,y:by}=m2s(mx,0);
    const tY=by-height,cw=width;
    // Bench proportions: seat at ~60% up, backrest above that
    const seatY=tY+height*.42;   // seat top in SVG coords
    const legH=by-seatY;         // leg height
    const legW=6,seatH=8,backH=height*.38,backW=5;
    return(<g>
      {/* legs — two pairs */}
      <rect x={bx+8}      y={seatY} width={legW} height={legH} rx="2" fill="#8B6914" stroke="#5a3e0a" strokeWidth="1.2"/>
      <rect x={bx+cw-14}  y={seatY} width={legW} height={legH} rx="2" fill="#8B6914" stroke="#5a3e0a" strokeWidth="1.2"/>
      {/* seat planks */}
      {[0,5,10].map((off,i)=>(
        <rect key={i} x={bx+2} y={seatY-seatH+off*.5} width={cw-4} height={4} rx="1.5"
              fill={i===1?'#a0722a':'#c8922a'} stroke="#7a5010" strokeWidth=".8"/>
      ))}
      {/* backrest posts */}
      <rect x={bx+10}     y={tY}        width={backW} height={backH} rx="2" fill="#8B6914" stroke="#5a3e0a" strokeWidth="1.2"/>
      <rect x={bx+cw-15}  y={tY}        width={backW} height={backH} rx="2" fill="#8B6914" stroke="#5a3e0a" strokeWidth="1.2"/>
      {/* backrest planks */}
      {[0,7].map((off,i)=>(
        <rect key={i} x={bx+6} y={tY+off} width={cw-12} height={5} rx="1.5"
              fill="#c8922a" stroke="#7a5010" strokeWidth=".8"/>
      ))}
      {/* blocked flash */}
      {blocked&&<g className="spark">
        <circle cx={bx+cw+18} cy={tY-12} r="16" fill="#fef08a" stroke="#eab308" strokeWidth="2" opacity=".95"/>
        <text x={bx+cw+18} y={tY-7} textAnchor="middle" fontSize="14" fontWeight="bold" fill="#92400e">!</text>
      </g>}
    </g>);
  }

  function ScissorLift({b,ld,showDragHandle=true}){
    // Always visible. 6 scissor diamonds stacked vertically.
    // At b=0 they are squished flat; as b grows they expand to show the classic X pattern.
    const N=6; // total scissors
    const{x:bx,y:by}=m2s(0,0);
    // Lift geometry
    const liftW=28;          // half-width of each X
    const lx=bx-liftW/2;    // left rail x
    const rx=bx+liftW/2;    // right rail x
    const baseY=by;          // bottom of lift (ground)
    const topY=OY-b;         // top of platform
    const totalH=baseY-topY; // total lift height (0 when b=0)
    const diamH=Math.max(2,totalH/N); // height of each diamond (min 2 so always visible)
    const COL='#f97316';     // orange
    const COL2='#ea580c';    // darker orange for rails
    return(<g>
      {/* Left and right vertical rails */}
      <line x1={lx} y1={baseY} x2={lx} y2={topY} stroke={COL2} strokeWidth="2.5" strokeLinecap="round"/>
      <line x1={rx} y1={baseY} x2={rx} y2={topY} stroke={COL2} strokeWidth="2.5" strokeLinecap="round"/>
      {/* 6 scissor X diamonds */}
      {Array.from({length:N},(_,i)=>{
        const y0=baseY-i*diamH;     // bottom of this diamond
        const y1=baseY-(i+1)*diamH; // top of this diamond
        const mid=(y0+y1)/2;
        return(<g key={i}>
          {/* Left diagonal: lx,y0 → rx,y1 */}
          <line x1={lx} y1={y0} x2={rx} y2={y1} stroke={COL} strokeWidth="2.5" strokeLinecap="round"/>
          {/* Right diagonal: rx,y0 → lx,y1 */}
          <line x1={rx} y1={y0} x2={lx} y2={y1} stroke={COL} strokeWidth="2.5" strokeLinecap="round"/>
          {/* Center pivot dot */}
          <circle cx={bx} cy={mid} r="3" fill={COL2}/>
        </g>);
      })}
      {/* Base plate */}
      <rect x={lx-6} y={baseY-4} width={liftW+12} height={8} rx="3" fill={COL2}/>
      {/* Top platform */}
      <rect x={lx-8} y={topY-5} width={liftW+16} height={8} rx="3" fill={COL2}/>
      {/* b= label */}
      <text x={lx-8} y={topY+4} textAnchor="end" fontSize="9" fill="#f97316" fontFamily="monospace" fontWeight="600">{'b='+Math.round(b)}</text>
      {/* Glowing drag handle on the platform — hidden when lift drag is disabled */}
      {showDragHandle&&<g style={{animation:'liftGlow 1.6s ease-in-out infinite',cursor:'grab'}}>
        <rect x={lx+2} y={topY-19} width={liftW+4} height={22} rx="8"
              fill={ld?'rgba(249,115,22,.55)':'rgba(249,115,22,.28)'}
              stroke={COL} strokeWidth={ld?2.5:2}/>
        {[-4,0,4].map((v,i)=>(
          <line key={i} x1={lx+6} y1={topY-8+v} x2={rx+2} y2={topY-8+v}
                stroke={ld?'#fff':'#fdba74'} strokeWidth="1.8" strokeLinecap="round" opacity=".9"/>
        ))}
        <text x={rx+8} y={topY-4} fontSize="11" fill="#fdba74" fontWeight="700" opacity=".85">&#x2195;</text>
      </g>}
    </g>);
  }

  // In JSX text we now use plain characters or template literals.
  function L2Hud({angle,b}){
    const br=Math.round(b);
    const vert=Math.abs(Math.abs(angle)-Math.PI/2)<.02;
    const m=vert?'∞':Math.tan(angle).toFixed(2);
    const babs=Math.abs(br);
    const bpart=br===0?'':(br>0?' + '+br:' \u2212 '+babs);
    return(<div className="hud">
      <span style={{fontSize:13,color:'rgba(255,255,255,.5)',fontWeight:500}}>Beam:</span>
      <span style={{fontSize:17,fontFamily:'Georgia,serif',color:'#fff',letterSpacing:'-.01em'}}>
        {vert?'x = 0':<>{'y = '}<span style={{color:'rgba(255,255,255,.9)'}}>{m}</span>{'x'}{br!==0&&<span className="bglow" style={{marginLeft:2}}>{bpart}</span>}</>}
      </span>
      <span style={{fontSize:13,color:'rgba(255,255,255,.4)'}}>{'\u03b8='+(angle*180/Math.PI).toFixed(1)+'\u00b0'}</span>
      {angle<-.05&&<span style={{background:'rgba(255,59,48,.2)',borderRadius:6,padding:'2px 8px',fontSize:13,color:'#ff6b60',fontWeight:500}}>neg slope</span>}
    </div>);
  }

  // ════════════════════════ LEVEL-1 CANVAS ═══════════════════════
  function Canvas1({angle,onAngle,fired,baked,hits,cookies,trees,riseRun}){
    const svgRef=useRef(null),drag=useRef(false);
    const[dragging,setDragging]=useState(false);
    const allHit=hits.size>0&&hits.size===cookies.length;
    const ca=useCallback((cx,cy)=>{
      const svg=svgRef.current;if(!svg)return null;
      const r=svg.getBoundingClientRect();
      const sx=(cx-r.left)*(CW/r.width),sy=(cy-r.top)*(CH/r.height);
      const dx=sx-OX,dy=-(sy-OY);
      if(dx<-10&&Math.abs(dy)<20)return null;
      return Math.max(0,Math.min(Math.PI/2*.999,Math.atan2(dy,Math.max(dx,0))));
    },[]);
    const mv=useCallback(e=>{
      if(!drag.current)return;e.preventDefault();
      const p=e.touches?e.touches[0]:e,a=ca(p.clientX,p.clientY);if(a!=null)onAngle(a);
    },[ca,onAngle]);
    const up=useCallback(()=>{drag.current=false;setDragging(false);},[]);
    useEffect(()=>{
      window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
      window.addEventListener('touchmove',mv,{passive:false});window.addEventListener('touchend',up);
      return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);window.removeEventListener('touchmove',mv);window.removeEventListener('touchend',up);};
    },[mv,up]);
    const dn=useCallback(e=>{
      const p=e.touches?e.touches[0]:e,a=ca(p.clientX,p.clientY);
      if(a!=null){e.preventDefault();onAngle(a);drag.current=true;setDragging(true);}
    },[ca,onAngle]);
    const s=m2s(0,0),ep=beamEnd(angle,0);
    return(<div className="canvas-wrap">
      <svg ref={svgRef} viewBox={'0 0 '+CW+' '+CH} className={'gsvg'+(dragging?' drag':'')}
           style={{maxHeight:450}} onMouseDown={dn} onTouchStart={dn}>
        <ParkScene trees={trees} pfx="l1"/>
        <Grid/>
        <line x1={s.x} y1={s.y} x2={ep.x} y2={ep.y} stroke="#0a84ff" strokeWidth="1.5" strokeDasharray="5 7" opacity=".55" style={{pointerEvents:'none'}}/>
        <MaserSVG angle={angle} dragging={dragging}/>
        {fired&&<line className="beam-line" x1={s.x} y1={s.y} x2={ep.x} y2={ep.y} stroke="#0a84ff" strokeWidth="2.5" strokeLinecap="round" style={{pointerEvents:'none'}}/>}
        {cookies.map(c=><CookieSVG key={c.id} mx={c.mx} my={c.my} baked={baked.has(c.id)} pop={hits.has(c.id)} showId={cookies.length>1} cid={'l1'+c.id}/>)}
        {riseRun&&allHit&&<RiseRun/>}
        {fired&&[...hits].map(id=>{const c=cookies.find(x=>x.id===id);return c?<Spark key={id} mx={c.mx} my={c.my}/>:null;})}
      </svg>
    </div>);
  }

  // ════════════════════════ LEVEL-2 CANVAS ═══════════════════════
  function Canvas2({angle,onAngle,b,onB,fired,baked,hits,cookies,obs,trees,showY,blocked,blkPt,lockAngle,allowNeg}){
    const svgRef=useRef(null),mode=useRef(null),bRef=useRef(b);
    useEffect(()=>{bRef.current=b;},[b]);
    const[da,setDa]=useState(false),[dl,setDl]=useState(false);
    const gp=useCallback((cx,cy)=>{
      const svg=svgRef.current;if(!svg)return null;
      const r=svg.getBoundingClientRect();
      return{sx:(cx-r.left)*(CW/r.width),sy:(cy-r.top)*(CH/r.height)};
    },[]);
    const dn=useCallback(e=>{
      const p=e.touches?e.touches[0]:e,v=gp(p.clientX,p.clientY);if(!v)return;
      e.preventDefault();
      if(v.sx<OX+35){mode.current='lift';setDl(true);}
      else if(!lockAngle){
        mode.current='angle';setDa(true);
        const msy=OY-bRef.current,dx=v.sx-OX,dy=-(v.sy-msy);
        if(dx>=-5){
          const raw=Math.atan2(dy,Math.max(dx,.001));
          onAngle(allowNeg?Math.max(-Math.PI/2*.98,Math.min(Math.PI/2*.98,raw)):Math.max(0,Math.min(Math.PI/2*.98,raw)));
        }
      }
    },[gp,lockAngle,allowNeg,onAngle]);
    const mv=useCallback(e=>{
      if(!mode.current)return;e.preventDefault();
      const p=e.touches?e.touches[0]:e,v=gp(p.clientX,p.clientY);if(!v)return;
      if(mode.current==='lift'){onB(Math.max(0,Math.min(300,OY-v.sy)));}
      else{
        const msy=OY-bRef.current,dx=v.sx-OX,dy=-(v.sy-msy);
        if(dx>=-5){
          const raw=Math.atan2(dy,Math.max(dx,.001));
          onAngle(allowNeg?Math.max(-Math.PI/2*.98,Math.min(Math.PI/2*.98,raw)):Math.max(0,Math.min(Math.PI/2*.98,raw)));
        }
      }
    },[gp,allowNeg,onAngle,onB]);
    const up=useCallback(()=>{mode.current=null;setDa(false);setDl(false);},[]);
    useEffect(()=>{
      window.addEventListener('mousemove',mv);window.addEventListener('mouseup',up);
      window.addEventListener('touchmove',mv,{passive:false});window.addEventListener('touchend',up);
      return()=>{window.removeEventListener('mousemove',mv);window.removeEventListener('mouseup',up);window.removeEventListener('touchmove',mv);window.removeEventListener('touchend',up);};
    },[mv,up]);
    const orig=m2s(0,b),ep=beamEnd(angle,b),fe=blocked&&blkPt?blkPt:ep;
    return(<div className="canvas-wrap">
      <svg ref={svgRef} viewBox={'0 0 '+CW+' '+CH} className={'gsvg'+(da?' drag':'')}
           style={{maxHeight:450}} onMouseDown={dn} onTouchStart={dn}>
        <ParkScene trees={trees} pfx="l2"/>
        <Grid/>
        {showY&&b>0&&<line className="yline" x1={OX} y1={OY} x2={OX} y2={OY-b} stroke="#0a84ff" strokeWidth="5" strokeLinecap="round"/>}
        {b>1&&<text x={OX+8} y={OY-b-6} fontSize="10" fill="#0a84ff" fontFamily="monospace" fontWeight="600">{'b='+Math.round(b)}</text>}
        {obs.map((o,i)=><ParkBench key={i} {...o} blocked={blocked}/>)}
        <ScissorLift b={b} ld={dl}/>
        <line x1={orig.x} y1={orig.y} x2={ep.x} y2={ep.y} stroke="#0a84ff" strokeWidth="1.5" strokeDasharray="5 7" opacity=".55" style={{pointerEvents:'none'}}/>
        <MaserSVG angle={angle} dragging={da} b={b}/>
        {fired&&<line className="beam-line" x1={orig.x} y1={orig.y} x2={fe.x} y2={fe.y}
                      stroke={blocked?'#ff9f0a':'#0a84ff'} strokeWidth="2.5" strokeLinecap="round" style={{pointerEvents:'none'}}/>}
        {cookies.map(c=><CookieSVG key={c.id} mx={c.mx} my={c.my} baked={baked.has(c.id)} pop={hits.has(c.id)} showId={cookies.length>1} cid={'l2'+c.id}/>)}
        {fired&&!blocked&&[...hits].map(id=>{const c=cookies.find(x=>x.id===id);return c?<Spark key={id} mx={c.mx} my={c.my}/>:null;})}
      </svg>
    </div>);
  }

  // ════════════════════════ SECTIONS ═════════════════════════════

  // ── Angle/Slope keypad: accepts m (slope) or θ (degrees) ───────
  // onAngle receives the new angle in radians
  function AngleKeypad({angle,onAngle,allowNeg,disabled,label}){
    const[raw,setRaw]=useState('');
    const[mode,setMode]=useState('m'); // 'm' or 'deg'
    const[err,setErr]=useState('');
    const vert=Math.abs(angle-Math.PI/2)<.02;
    const mDisp=vert?'∞':Math.tan(angle).toFixed(3);
    const degDisp=(angle*180/Math.PI).toFixed(1);

    const commit=()=>{
      const t=raw.trim();
      if(!t){setErr('Enter a value');return;}
      let val;
      // support fractions like 1/3
      if(t.includes('/')){const[n,d]=t.split('/');val=parseFloat(n)/parseFloat(d);}
      else val=parseFloat(t);
      if(isNaN(val)){setErr('Not a valid number');return;}
      let a;
      if(mode==='m'){
        if(Math.abs(val)>50){setErr('|m| must be ≤ 50');return;}
        a=Math.atan(val);
      } else {
        if(Math.abs(val)>=90){setErr('θ must be between −89° and 89°');return;}
        a=val*Math.PI/180;
      }
      if(!allowNeg&&a<0){setErr('Negative slope not allowed here');return;}
      setErr('');setRaw('');
      onAngle(a);
    };

    return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,padding:'14px 18px',
                        background:'#f9f9fb',borderRadius:14,border:'1.5px solid #e5e5ea',minWidth:260}}>
      {label&&<div style={{fontSize:12,fontWeight:600,color:'#8e8e93',letterSpacing:'.07em',marginBottom:2}}>{label}</div>}
      <div style={{display:'flex',gap:6,marginBottom:4}}>
        {[['m','Slope m'],['deg','Angle θ°']].map(([k,lbl])=>(
          <button key={k} onClick={()=>{setMode(k);setErr('');setRaw('');}}
                  style={{padding:'5px 14px',borderRadius:20,border:'1.5px solid',fontSize:13,fontWeight:600,cursor:'pointer',
                          borderColor:mode===k?'#0a84ff':'#d1d1d6',
                          background:mode===k?'#0a84ff':'#fff',
                          color:mode===k?'#fff':'#636366'}}>
            {lbl}
          </button>
        ))}
      </div>
      <div style={{display:'flex',gap:8,alignItems:'center'}}>
        <input value={raw} onChange={e=>{setRaw(e.target.value);setErr('');}}
               onKeyDown={e=>e.key==='Enter'&&commit()}
               disabled={disabled}
               placeholder={mode==='m'?'e.g. 1/3 or 0.5':'e.g. 27.5'}
               style={{width:140,border:'1.5px solid '+(err?'#ff3b30':'#d1d1d6'),borderRadius:10,
                       padding:'10px 13px',fontSize:16,fontFamily:'monospace',outline:'none',
                       background:disabled?'#f2f2f7':'#fff',color:'#1c1c1e'}}/>
        <button onClick={commit} disabled={disabled}
                style={{padding:'10px 18px',borderRadius:10,background:'#0a84ff',color:'#fff',
                        border:'none',fontSize:15,fontWeight:600,cursor:disabled?'default':'pointer',
                        opacity:disabled?.5:1}}>
          Set
        </button>
      </div>
      {err&&<p style={{fontSize:13,color:'#ff3b30',margin:0}}>{err}</p>}
      <div style={{fontSize:13,color:'#aeaeb2',marginTop:2}}>
        Current: m = {mDisp} · θ = {degDisp}°
      </div>
    </div>);
  }

  function EqBar({angle}){
    const vert=Math.abs(angle-Math.PI/2)<.02;
    const m=vert?'∞':Math.tan(angle).toFixed(2);
    return(<div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',justifyContent:'center'}}>
      <span style={{fontSize:14,color:'#8e8e93',fontWeight:500}}>Trajectory:</span>
      <span className="eqchip">{vert?'x = 0':'y = '+m+'x'}</span>
      <span style={{fontSize:14,color:'#aeaeb2'}}>{'θ = '+(angle*180/Math.PI).toFixed(1)+'°'}</span>
      <span style={{fontSize:14,color:'#aeaeb2'}}>{'m = '+m}</span>
    </div>);
  }

  function GameSec({sec,sRef,onDone,setLog}){

    const Intro11=()=>(<p style={{color:'#636366',fontSize:15,lineHeight:1.6,margin:'0 auto',maxWidth:460}}>

        <strong>Maser history:</strong> In 1953, Charles Townes at Columbia University built the first maser (Microwave Amplification by Stimulated Emission of Radiation). It uses quantum mechanics to amplify microwaves &mdash; the same principle later extended to visible light as the <em>laser</em>. Townes won the Nobel Prize in Physics in 1964. Today masers are used in atomic clocks, deep-space communication, and radio astronomy.{' '}
        <span style={{color:'#0a84ff',cursor:'pointer'}} onClick={e=>{e.stopPropagation();setMaserOpen(false);}}>Close</span>
      </span>}
    </p>);
    return(<div ref={sRef} className="sec">
      <div style={{textAlign:'center',marginBottom:24,width:'100%',maxWidth:700}}>

        <h2 className="serif" style={{fontSize:'clamp(24px,4.5vw,42px)',fontWeight:400,color:'#1c1c1e',margin:'0 0 10px',letterSpacing:'-.02em',lineHeight:1.15}}>{sec.title}</h2>
        {sec.id==='1.1'?<Intro11/>:<p style={{color:'#636366',fontSize:15,lineHeight:1.6,margin:'0 auto',maxWidth:440}}>{sec.desc}</p>}

      {!fired&&!ok&&<div className="hcard" style={{marginTop:14}}>&#x1F4A1; {sec.hint(sec.cookies[0])}</div>}
      {miss&&<div className="mcard fup" style={{marginTop:14}}><div style={{fontSize:20,marginBottom:5}}>&#x1F3AF; Miss</div><div style={{color:'#636366',fontSize:15,lineHeight:1.5}}>Adjust aim and try again.{att>=sec.hintAfter&&<span style={{color:'#8e8e93'}}>{' Hint: aim for about '+sec.hintAngle+'.'}</span>}</div></div>}
      {partial&&<div className="pcard fup" style={{marginTop:14}}><div style={{fontSize:20,marginBottom:5}}>&#x1F3AF; Partial ({hits.size}/{sec.cookies.length})</div><div style={{color:'#636366',fontSize:15}}>They&apos;re collinear — one line must pass through all three!</div></div>}
      {ok&&<div className="scard fup" style={{marginTop:14}}><div style={{fontSize:26,marginBottom:6}}>&#x1F36A;&#x2728;</div><div style={{fontWeight:600,fontSize:16,color:'#1c5c35',marginBottom:6}}>{sec.okTitle}</div><div style={{color:'#2d7a4b',fontSize:15,lineHeight:1.6}}>{sec.okBody(slope)}</div></div>}
      {ok&&eggShown&&<div className="fup" style={{marginTop:14,display:'flex',gap:14,alignItems:'flex-start',maxWidth:480,background:'#f9f9fb',borderRadius:16,padding:'16px 18px',border:'1.5px solid #e5e5ea'}}>
        <svg viewBox="0 0 150 200" width="52" height="69" style={{flexShrink:0}}>

        <div style={{fontSize:15,color:'#3a3a3c',lineHeight:1.65}}>

          A real maser is microwaves, not heat &mdash; it would <em>melt</em> the chocolate but never caramelize the dough! The golden-brown color needs the Maillard reaction from dry heat. But caramelizing looks way cooler for a game. &#x1F36A;
          <span style={{display:'block',marginTop:8,color:'#636366',fontSize:14}}>That&apos;s your math tutor in the bottom-right corner &mdash; click any time for hints!</span>

      </div>}
      <div style={{display:'flex',gap:12,marginTop:20,flexWrap:'wrap',justifyContent:'center'}}>

        {fired&&!ok&&<button className="gbtn" onClick={reset}>Reset</button>}
      </div>
      {att>0&&!ok&&<div style={{marginTop:8,fontSize:13,color:'#c7c7cc'}}>{att+' attempt'+(att!==1?'s':'')}</div>}
      {ok&&<div className="mnote fup" style={{marginTop:28}}>
        <div style={{fontSize:13,fontWeight:600,color:'#8e8e93',letterSpacing:'.06em',marginBottom:6}}>MATH CONNECTION</div>
        <p style={{fontSize:15,color:'#3a3a3c',lineHeight:1.65,margin:0}}>
          {sec.id==='1.1'&&<>Maser at origin &rarr; beam follows <em>y&nbsp;=&nbsp;mx</em>. Slope <em>m&nbsp;=&nbsp;tan(&theta;)</em>.</>}
          {sec.id==='1.2'&&<>Three collinear points share the same slope. &Delta;y/&Delta;x = 50/150 = 1/3 between every pair.</>}
          {sec.id==='1.3'&&<>Horizontal line &rarr; m = 0. No rise: &Delta;y = 0 &rarr; m = 0/&Delta;x = 0.</>}
          {sec.id==='1.4'&&<>Larger slope = steeper line. As &theta; &rarr; 90&deg;, m &rarr; &infin;. Vertical lines have undefined slope.</>}
        </p>
      </div>}
      <Agent msg={agMsg} setMsg={setAgMsg} onAsk={handleAskTotoro}/>
    </div>);
  }

  // ── SlopeExplorer: 4-phase discovery component ─────────────────
  // Canvas geometry
  const GW=640,GH=400,GOX=64,GOY=340,GSX=1.42,GSY=1.12;
  const gm2s=(mx,my)=>({x:GOX+mx*GSX, y:GOY-my*GSY});
  const gs2m=(sx,sy)=>({mx:(sx-GOX)/GSX, my:(GOY-sy)/GSY});
  const projectOnLine=(mx,my,lmx,lmy,ldx,ldy)=>{
    const len2=ldx*ldx+ldy*ldy;
    if(len2<0.0001)return{mx:lmx,my:lmy};
    const t=((mx-lmx)*ldx+(my-lmy)*ldy)/len2;
    return{mx:lmx+t*ldx,my:lmy+t*ldy,t};
  };
  const clampMath=(mx,my)=>({
    mx:Math.max(2,Math.min((GW-GOX-12)/GSX,mx)),
    my:Math.max(-(GOY-GH+12)/GSY,Math.min((GOY-12)/GSY,my))
  });
  // Clamp a point that must stay on the line (lmx+t*ldx, lmy+t*ldy) within canvas bounds.
  // Returns the clamped point still ON the line by adjusting t.
  const clampOnLine=(lmx,lmy,ldx,ldy,t)=>{
    const mxMin=2, mxMax=(GW-GOX-12)/GSX;
    const myMin=-(GOY-GH+12)/GSY, myMax=(GOY-12)/GSY;
    let tMin=-Infinity, tMax=Infinity;
    if(Math.abs(ldx)>0.0001){
      tMin=Math.max(tMin,(mxMin-lmx)/ldx<(mxMax-lmx)/ldx?(mxMin-lmx)/ldx:(mxMax-lmx)/ldx);
      tMax=Math.min(tMax,(mxMin-lmx)/ldx>(mxMax-lmx)/ldx?(mxMin-lmx)/ldx:(mxMax-lmx)/ldx);
    }
    if(Math.abs(ldy)>0.0001){
      tMin=Math.max(tMin,(myMin-lmy)/ldy<(myMax-lmy)/ldy?(myMin-lmy)/ldy:(myMax-lmy)/ldy);
      tMax=Math.min(tMax,(myMin-lmy)/ldy>(myMax-lmy)/ldy?(myMin-lmy)/ldy:(myMax-lmy)/ldy);
    }
    const tc=Math.max(tMin,Math.min(tMax,t));
    return{mx:lmx+tc*ldx,my:lmy+tc*ldy};
  };
  // Knowledge checks: give coords, pick slope
  const SE_KCS=[
    {A:{mx:100,my:60},B:{mx:400,my:180},opts:['3/10','1/2','2/5','3/5'],cor:'2/5',
     hint:'Δy = 180−60 = 120, Δx = 400−100 = 300. Simplify 120/300.'},
    {A:{mx:50,my:250},B:{mx:350,my:100},opts:['−1/2','1/2','−3/4','3/4'],cor:'−1/2',
     hint:'Δy = 100−250 = −150 (B is lower!), Δx = 300. Simplify −150/300.'},
    {A:{mx:80,my:40},B:{mx:280,my:240},opts:['1','2','1/2','1/3'],cor:'1',
     hint:'Δy = 200, Δx = 200. What is 200/200?'},
  ];

  // Inline fraction: stacked numerator/denominator with horizontal bar
  function Frac({n,d,size=15,color='inherit'}){
    return(
      <span style={{display:'inline-flex',flexDirection:'column',alignItems:'center',verticalAlign:'middle',lineHeight:1.1,margin:'0 3px',fontSize:size,color}}>
        <span style={{borderBottom:'1.5px solid currentColor',paddingBottom:'1px',lineHeight:1.2,whiteSpace:'nowrap'}}>{n}</span>
        <span style={{lineHeight:1.2,whiteSpace:'nowrap'}}>{d}</span>
      </span>
    );
  }

  function SlopeExplorer({sRef,onDone,setLog}){
    // Phases: 0=free drag  1=slope input  2=constrained slide+KCs  3=synthesis  4=KC problems
    const[phase,setPhase]=useState(0);
    const[aPos,setAPos]=useState({mx:80,my:60});
    const[bPos,setBPos]=useState({mx:300,my:220});
    const[dragging,setDragging]=useState(null);
    const[hasDragged,setHasDragged]=useState(false);
    const svgRef=useRef(null);
    const[slopeInput,setSlopeInput]=useState('');
    const[slopeGrade,setSlopeGrade]=useState(null);
    const[qA,setQA]=useState(null);
    const[qB,setQB]=useState(null);
    const[kcIdx,setKcIdx]=useState(0);
    const[kcAns,setKcAns]=useState(null);
    const done=useRef(false);
    const logEv=(sec,ans,ok)=>setLog(p=>({...p,answersLog:[...p.answersLog,{sec,answer:ans,correct:ok}]}));

    const dy=bPos.my-aPos.my, dx=bPos.mx-aPos.mx;
    const slopeDec=dx!==0?(dy/dx):null;
    const slopeStr=slopeDec!==null?slopeDec.toFixed(3):'∞';
    const ldx=dx||1, ldy=dy;

    const getMP=e=>{
      if(!svgRef.current)return{mx:0,my:0};
      const r=svgRef.current.getBoundingClientRect();
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      return gs2m(((cx-r.left)/r.width)*GW,((cy-r.top)/r.height)*GH);
    };
    const onMouseMove=useCallback(e=>{
      if(!dragging)return;
      const raw=getMP(e);
      if(phase<2){
        const c=clampMath(raw.mx,raw.my);
        if(dragging==='A'){setAPos(c);setHasDragged(true);}
        else{setBPos(c);setHasDragged(true);}
      } else {
        const proj=projectOnLine(raw.mx,raw.my,aPos.mx,aPos.my,ldx,ldy);
        const c=clampOnLine(aPos.mx,aPos.my,ldx,ldy,proj.t!=null?proj.t:0);
        if(dragging==='A')setAPos(c);
        else setBPos(c);
      }
    },[dragging,phase,aPos,bPos,ldx,ldy]);
    const onMouseUp=useCallback(()=>setDragging(null),[]);
    const onCookieDown=(e,which)=>{e.stopPropagation();setDragging(which);};

    const checkSlope=()=>{
      if(slopeDec===null){setSlopeGrade('no');return;}
      // Parse decimal or fraction (e.g. "1/3", "-2/5", "0.333")
      let v=NaN;
      const trimmed=slopeInput.trim().replace(',','.');
      if(trimmed.includes('/')){
        const parts=trimmed.split('/');
        if(parts.length===2){
          const num=parseFloat(parts[0]),den=parseFloat(parts[1]);
          if(!isNaN(num)&&!isNaN(den)&&den!==0)v=num/den;
        }
      } else {
        v=parseFloat(trimmed);
      }
      if(isNaN(v)){setSlopeGrade('no');return;}
      const ok=Math.abs(v-slopeDec)<=0.005;
      setSlopeGrade(ok?'ok':'no');
      logEv('se-slope',v,ok);
      if(ok)setTimeout(()=>setPhase(2),1500);
    };

    const bothKCsOk=qA==='change'&&qB==='same';
    useEffect(()=>{if(bothKCsOk&&phase===2)setTimeout(()=>setPhase(3),1800);},[bothKCsOk,phase]);

    const kc=SE_KCS[kcIdx]||null;
    const kcDy=kc?kc.B.my-kc.A.my:0, kcDx=kc?kc.B.mx-kc.A.mx:1;
    const checkKC=opt=>{
      if(kcAns!==null)return;
      setKcAns(opt);
      const ok=opt===kc.cor;
      logEv('se-kc'+kcIdx,opt,ok);
      if(ok){
        if(kcIdx<SE_KCS.length-1)setTimeout(()=>{setKcIdx(i=>i+1);setKcAns(null);},2500);
        else if(!done.current){done.current=true;onDone();}
      }
    };

    const lineEndpoints=()=>{
      const sa=gm2s(aPos.mx,aPos.my),sb=gm2s(bPos.mx,bPos.my);
      const dsx=sb.x-sa.x,dsy=sb.y-sa.y,len=Math.sqrt(dsx*dsx+dsy*dsy);
      if(len<1)return{x1:sa.x-400,y1:sa.y,x2:sa.x+400,y2:sa.y};
      const ux=dsx/len,uy=dsy/len;
      return{x1:sa.x-ux*900,y1:sa.y-uy*900,x2:sa.x+ux*900,y2:sa.y+uy*900};
    };

    // ── Sub-components ──────────────────────────────────────────
    const GridLines=()=>{
      const xt=[0,50,100,150,200,250,300,350,400,450];
      const yt=[0,50,100,150,200,250,300];
      return(<g>
        {xt.map(v=><line key={'gx'+v} x1={GOX+v*GSX} y1={10} x2={GOX+v*GSX} y2={GH-4} stroke={v===0?'#d1d1d6':'#f0f0f0'} strokeWidth={v===0?1.5:1}/>)}
        {yt.map(v=><line key={'gy'+v} x1={GOX-4} y1={GOY-v*GSY} x2={GW-10} y2={GOY-v*GSY} stroke={v===0?'#d1d1d6':'#f0f0f0'} strokeWidth={v===0?1.5:1}/>)}
        <polygon points={`${GW-10},${GOY} ${GW-16},${GOY-4} ${GW-16},${GOY+4}`} fill="#c7c7cc"/>
        <polygon points={`${GOX},10 ${GOX-4},16 ${GOX+4},16`} fill="#c7c7cc"/>
        {[50,100,150,200,250,300,350,400].map(v=><text key={v} x={GOX+v*GSX} y={GOY+15} textAnchor="middle" fontSize="8" fill="#c7c7cc">{v}</text>)}
        {[50,100,150,200,250].map(v=><text key={v} x={GOX-10} y={GOY-v*GSY+3} textAnchor="end" fontSize="8" fill="#c7c7cc">{v}</text>)}
        <text x={GW-8} y={GOY+15} fontSize="9" fill="#aeaeb2">x</text>
        <text x={GOX-16} y={14} fontSize="9" fill="#aeaeb2">y</text>
      </g>);
    };

    const SlopeTriangle=({aP,bP})=>{
      const sa=gm2s(aP.mx,aP.my),sb=gm2s(bP.mx,bP.my);
      const tdy=bP.my-aP.my,tdx=bP.mx-aP.mx;
      const corner={x:sb.x,y:sa.y};
      const offDy=tdx>=0?18:-28;
      const offDx=tdy>=0?-20:18;
      return(<g opacity=".9">
        <polygon points={`${sa.x},${sa.y} ${sb.x},${sb.y} ${corner.x},${corner.y}`} fill="rgba(255,215,80,.2)"/>
        <line x1={sb.x} y1={sa.y} x2={sb.x} y2={sb.y} stroke="#34c759" strokeWidth="2.5" strokeDasharray="5 3"/>
        <line x1={sa.x} y1={sa.y} x2={sb.x} y2={sa.y} stroke="#0a84ff" strokeWidth="2.5" strokeDasharray="5 3"/>
        <rect x={corner.x-(tdx>0?9:0)} y={corner.y-(tdy>0?0:9)} width="9" height="9" fill="none" stroke="#aaa" strokeWidth="1"/>
        <rect x={sb.x+offDy-20} y={(sa.y+sb.y)/2-9} width="46" height="16" rx="5" fill="#34c759"/>
        <text x={sb.x+offDy+3} y={(sa.y+sb.y)/2+4} textAnchor="middle" fontSize="10" fill="white" fontWeight="700">&Delta;y={Math.round(tdy)}</text>
        <rect x={(sa.x+sb.x)/2-23} y={sa.y+offDx-8} width="46" height="16" rx="5" fill="#0a84ff"/>
        <text x={(sa.x+sb.x)/2} y={sa.y+offDx+4} textAnchor="middle" fontSize="10" fill="white" fontWeight="700">&Delta;x={Math.round(tdx)}</text>
      </g>);
    };

    const CookieDot=({pos,label,draggingThis})=>{
      const{x:sx,y:sy}=gm2s(pos.mx,pos.my);
      const labelLeft=label==='A';
      // coords go above cookie; letter label goes below
      const coordY=pos.my<35?sy+38:sy-24;
      return(<g style={{cursor:'grab'}} onMouseDown={e=>onCookieDown(e,label)} onTouchStart={e=>onCookieDown(e,label)}>
        {draggingThis&&<circle cx={sx} cy={sy} r="22" fill="rgba(10,132,255,.1)" stroke="#0a84ff" strokeWidth="1.2" strokeDasharray="4 2"/>}
        <circle cx={sx} cy={sy} r="15" fill="#F5DEB3" stroke="#c4a47a" strokeWidth="1.8"/>
        <circle cx={sx-4} cy={sy-4} r="2.7" fill="#3d2200" opacity=".85"/>
        <circle cx={sx+5} cy={sy-1} r="2.4" fill="#3d2200" opacity=".85"/>
        <circle cx={sx+1} cy={sy+6} r="2.2" fill="#3d2200" opacity=".85"/>
        {/* letter label: below the cookie */}
        <text x={sx} y={sy+30} textAnchor="middle" fontSize="13" fill="#7a5010" fontWeight="700">{label}</text>
        {/* coordinate label: above the cookie (or below if near bottom) */}
        <text x={sx} y={coordY} textAnchor="middle" fontSize="10" fill="#636366" fontFamily="monospace">({Math.round(pos.mx)},{Math.round(pos.my)})</text>
      </g>);
    };

    const LiveReadout=()=>(
      <div style={{display:'flex',gap:10,marginTop:12,flexWrap:'wrap',justifyContent:'center'}}>
        <div style={{background:'#e8faf0',border:'1.5px solid #a3e6be',borderRadius:10,padding:'7px 16px',fontFamily:'monospace',fontSize:15,fontWeight:600,color:'#1c5c35'}}>
          &Delta;y = <span style={{color:'#34c759'}}>{Math.round(dy)}</span>
        </div>
        <div style={{background:'#f0f7ff',border:'1.5px solid #bae0ff',borderRadius:10,padding:'7px 16px',fontFamily:'monospace',fontSize:15,fontWeight:600,color:'#1c3a5c'}}>
          &Delta;x = <span style={{color:'#0a84ff'}}>{Math.round(dx)}</span>
        </div>
        {phase!==1&&<div style={{background:'#f9f9fb',border:'1.5px solid #d1d1d6',borderRadius:10,padding:'7px 16px',fontFamily:'monospace',fontSize:15,fontWeight:600,color:'#1c1c1e'}}>
          m = {dx!==0?slopeStr:'∞'}
        </div>}
      </div>
    );

    const PhasePills=()=>(
      <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:14,flexWrap:'wrap'}}>
        {['Drag & Explore','Compute Slope','Slide the Line','Key Takeaways'].map((lbl,i)=>(
          <div key={i} style={{padding:'4px 13px',borderRadius:100,fontSize:13,fontWeight:600,
            background:i<phase?'#34c759':i===phase?'#0a84ff':'#f2f2f7',
            color:i<=phase?'#fff':'#aeaeb2',transition:'all .4s'}}>
            {i<phase?'✓ ':''}{lbl}
          </div>
        ))}
      </div>
    );

    const le=lineEndpoints();

    // ── Phase 4: Knowledge Checks ────────────────────────────────
    if(phase===4){
      if(!kc)return null;
      const kcSvgA=gm2s(kc.A.mx,kc.A.my),kcSvgB=gm2s(kc.B.mx,kc.B.my);
      const kcCorner={x:kcSvgB.x,y:kcSvgA.y};
      const dsx=kcSvgB.x-kcSvgA.x,dsy=kcSvgB.y-kcSvgA.y,kcLen=Math.sqrt(dsx*dsx+dsy*dsy);
      const kcLine=kcLen>1?{x1:kcSvgA.x-dsx/kcLen*700,y1:kcSvgA.y-dsy/kcLen*700,x2:kcSvgA.x+dsx/kcLen*700,y2:kcSvgA.y+dsy/kcLen*700}:null;
      return(<div ref={sRef} className="sec">
        <div style={{textAlign:'center',marginBottom:20}}>
          <div className="pill" style={{display:'inline-block',marginBottom:10}}>Level 1 · Slope Check</div>
          <h2 className="serif" style={{fontSize:'clamp(20px,3.5vw,34px)',fontWeight:400,color:'#1c1c1e',margin:'0 0 8px',letterSpacing:'-.02em'}}>Compute the Slope</h2>
          <p style={{color:'#636366',fontSize:16,lineHeight:1.6}}>Problem {kcIdx+1} of {SE_KCS.length} — read the cookie coordinates, then pick the correct slope.</p>
        </div>
        <div style={{width:'100%',maxWidth:680,display:'flex',flexDirection:'column',gap:14}}>
          <div className="wcard" style={{padding:'12px 14px'}}>
            <svg viewBox={'0 0 '+GW+' '+GH} style={{width:'100%',borderRadius:8,background:'#fafafa'}}>
              <GridLines/>
              {kcLine&&<line x1={kcLine.x1} y1={kcLine.y1} x2={kcLine.x2} y2={kcLine.y2} stroke="#0a84ff" strokeWidth="1.8" strokeDasharray="8 4" opacity=".4"/>}
              <polygon points={`${kcSvgA.x},${kcSvgA.y} ${kcSvgB.x},${kcSvgB.y} ${kcCorner.x},${kcCorner.y}`} fill="rgba(255,215,80,.2)"/>
              <line x1={kcSvgB.x} y1={kcSvgA.y} x2={kcSvgB.x} y2={kcSvgB.y} stroke="#34c759" strokeWidth="2.2" strokeDasharray="5 3"/>
              <rect x={kcSvgB.x+(kcDx>0?4:-46)} y={(kcSvgA.y+kcSvgB.y)/2-8} width="42" height="16" rx="4" fill="#34c759"/>
              <text x={kcSvgB.x+(kcDx>0?25:-25)} y={(kcSvgA.y+kcSvgB.y)/2+4} textAnchor="middle" fontSize="9" fill="white" fontWeight="700">&Delta;y={kcDy}</text>
              <line x1={kcSvgA.x} y1={kcSvgA.y} x2={kcSvgB.x} y2={kcSvgA.y} stroke="#0a84ff" strokeWidth="2.2" strokeDasharray="5 3"/>
              <rect x={(kcSvgA.x+kcSvgB.x)/2-21} y={kcSvgA.y+(kcDy>0?-22:6)} width="42" height="16" rx="4" fill="#0a84ff"/>
              <text x={(kcSvgA.x+kcSvgB.x)/2} y={kcSvgA.y+(kcDy>0?-9:19)} textAnchor="middle" fontSize="9" fill="white" fontWeight="700">&Delta;x={kcDx}</text>
              <rect x={kcCorner.x-(kcDx>0?9:0)} y={kcCorner.y-(kcDy>0?0:9)} width="9" height="9" fill="none" stroke="#9ca3af" strokeWidth="1"/>
              {[{pos:kc.A,lbl:'A'},{pos:kc.B,lbl:'B'}].map(({pos,lbl})=>{
                const{x:sx,y:sy}=gm2s(pos.mx,pos.my);
                return(<g key={lbl}>
                  <circle cx={sx} cy={sy} r="15" fill="#F5DEB3" stroke="#c4a47a" strokeWidth="1.5"/>
                  <circle cx={sx-4} cy={sy-4} r="2.6" fill="#3d2200" opacity=".85"/>
                  <circle cx={sx+5} cy={sy-1} r="2.3" fill="#3d2200" opacity=".85"/>
                  <circle cx={sx+1} cy={sy+6} r="2" fill="#3d2200" opacity=".85"/>
                  <text x={sx} y={sy+30} textAnchor="middle" fontSize="13" fill="#7a5010" fontWeight="700">{lbl}</text>
                  <text x={sx} y={sy-22} textAnchor="middle" fontSize="10" fill="#636366" fontFamily="monospace">({pos.mx},{pos.my})</text>
                </g>);
              })}
            </svg>
          </div>
          <div className="qcard">
            <div style={{fontSize:14,fontWeight:600,color:'#636366',letterSpacing:'.06em',marginBottom:10}}>KNOWLEDGE CHECK {kcIdx+1}/{SE_KCS.length}</div>
            <p style={{fontSize:16,color:'#1c1c1e',margin:'0 0 5px'}}>Cookie A = <strong>({kc.A.mx}, {kc.A.my})</strong>, Cookie B = <strong>({kc.B.mx}, {kc.B.my})</strong></p>
            <div style={{fontFamily:'monospace',fontSize:15,color:'#636366',margin:'0 0 14px',background:'#f9f9fb',borderRadius:8,padding:'8px 12px',display:'inline-block'}}>
              &Delta;y = {kc.B.my}&minus;{kc.A.my} = {kcDy}&nbsp;&nbsp;|&nbsp;&nbsp;&Delta;x = {kc.B.mx}&minus;{kc.A.mx} = {kcDx}
            </div>
            <p style={{fontSize:16,fontWeight:600,color:'#1c1c1e',margin:'0 0 14px',display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>What is the slope m =<Frac n={<>&Delta;y</>} d={<>&Delta;x</>} size={15}/> ?</p>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {kc.opts.map(opt=>{
                const isok=opt===kc.cor,mine=kcAns===opt;
                let bg='#fff',brd='#e5e5ea',col='#3a3a3c';
                if(kcAns){if(isok){bg='#e8faf0';brd='#34c759';col='#1c5c35';}else if(mine){bg='#fff4f4';brd='#ff3b30';col='#9b1c1c';}else{col='#aeaeb2';}}
                return<button key={opt} className="mcbtn" style={{background:bg,borderColor:brd,color:col}} onClick={()=>checkKC(opt)} disabled={!!kcAns}>{opt}</button>;
              })}
            </div>
            {kcAns&&kcAns!==kc.cor&&<p style={{fontSize:16,color:'#ff6b35',marginTop:10,lineHeight:1.5}}>Not quite. {kc.hint}</p>}
            {kcAns===kc.cor&&<p style={{fontSize:16,color:'#34c759',marginTop:10,fontWeight:600}}>&#x2713; Correct! {kcIdx<SE_KCS.length-1?'Next one…':'All done — section complete!'}</p>}
          </div>
        </div>
      </div>);
    }

    // ── Phases 0–3: main interactive section ───────────────────
    return(<div ref={sRef} className="sec" style={{paddingBottom:80}}>
      <div style={{textAlign:'center',marginBottom:16,width:'100%',maxWidth:700}}>
        <div className="pill" style={{display:'inline-block',marginBottom:10}}>Level 1 · The Ratio</div>
        <h2 className="serif" style={{fontSize:'clamp(22px,4vw,38px)',fontWeight:400,color:'#1c1c1e',margin:'0 0 8px',letterSpacing:'-.02em'}}>
          {phase===0&&'Drag & Discover'}
          {phase===1&&"What's the Ratio?"}
          {phase===2&&'Slide Along the Line'}
          {phase>=3&&'Key Takeaways'}
        </h2>
        <p style={{color:'#636366',fontSize:16,lineHeight:1.65,maxWidth:520,margin:'0 auto'}}>
          {phase===0&&<>Two cookies sit on a Cartesian grid. A line passes through both. <strong>Drag either cookie</strong> anywhere on the plane — watch how the line, the slope triangle, and the <Frac n={<>&Delta;y</>} d={<>&Delta;x</>} size={14}/> readout update in real-time.</>}
          {phase===1&&<>The <span style={{color:'#34c759',fontWeight:600}}>green dashed side</span> of the triangle shows rise (&Delta;y) and the <span style={{color:'#0a84ff',fontWeight:600}}>blue dashed side</span> shows run (&Delta;x). Based on the live readout, compute the slope &mdash; then type it below.</>}
          {phase===2&&<>The line is now <strong>locked in place</strong>. Drag either cookie and it will slide along the line. Watch the triangle grow and shrink as you move them closer or farther apart. Then answer the questions below.</>}
          {phase>=3&&<>You&apos;ve just discovered two fundamental truths about slope. Here&apos;s your math tutor&apos;s summary.</>}
        </p>
      </div>

      <PhasePills/>

      {/* Slope definition — shown from the very start */}
      {phase<3&&<div className="defcard fup" style={{width:'100%',maxWidth:560,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:600,color:'#0a84ff',letterSpacing:'.06em',marginBottom:8}}>DEFINITION — SLOPE</div>
        <div style={{textAlign:'center',padding:'10px 0',display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
          <span style={{fontSize:18,fontFamily:'Georgia,serif',color:'#1c1c1e'}}>m =</span>
          <Frac n={<>&Delta;y</>} d={<>&Delta;x</>} size={20}/>
          <span style={{fontSize:18,fontFamily:'Georgia,serif',color:'#1c1c1e'}}>=</span>
          <Frac n={<>y<sub>B</sub>&nbsp;&minus;&nbsp;y<sub>A</sub></>} d={<>x<sub>B</sub>&nbsp;&minus;&nbsp;x<sub>A</sub></>} size={16}/>
        </div>
        <p style={{fontSize:14,color:'#636366',lineHeight:1.6,margin:'8px 0 0'}}>&Delta; (&ldquo;delta&rdquo;) means &ldquo;change in.&rdquo; Slope is <em>rise over run</em>: how much the line goes up for every unit it goes right.</p>
      </div>}

      {/* Main SVG canvas */}
      <div className="wcard" style={{padding:'10px',width:'100%',maxWidth:700}}>
        <svg ref={svgRef} viewBox={'0 0 '+GW+' '+GH}
             style={{width:'100%',borderRadius:8,background:'#fafafa',touchAction:'none',cursor:dragging?'grabbing':'default'}}
             onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}
             onTouchMove={onMouseMove} onTouchEnd={onMouseUp}>
          <GridLines/>
          <line x1={le.x1} y1={le.y1} x2={le.x2} y2={le.y2}
                stroke="#0a84ff" strokeWidth="2.2"
                opacity={phase>=2?".75":".4"}
                strokeDasharray={phase>=2?'none':'8 4'}/>
          {phase===0&&[aPos,bPos].map((p,i)=>{
            const{x:sx,y:sy}=gm2s(p.mx,p.my);
            return<circle key={i} cx={sx} cy={sy} r="24" fill="rgba(10,132,255,.06)" className="hpulse"/>;
          })}
          <SlopeTriangle aP={aPos} bP={bPos}/>
          <CookieDot pos={aPos} label="A" draggingThis={dragging==='A'}/>
          <CookieDot pos={bPos} label="B" draggingThis={dragging==='B'}/>
          {phase===0&&!hasDragged&&<>
            <text x={gm2s(aPos.mx,aPos.my).x+22} y={gm2s(aPos.mx,aPos.my).y-26} fontSize="11" fill="#aeaeb2" fontStyle="italic">drag me!</text>
            <text x={gm2s(bPos.mx,bPos.my).x-22} y={gm2s(bPos.mx,bPos.my).y-26} fontSize="11" fill="#aeaeb2" fontStyle="italic" textAnchor="end">or me!</text>
          </>}
          {phase>=2&&<>
            <rect x={GOX+4} y={8} width={108} height={20} rx="7" fill="rgba(10,132,255,.85)"/>
            <text x={GOX+58} y={21} textAnchor="middle" fontSize="9.5" fill="white" fontWeight="600">&#x1F512; Line locked</text>
          </>}
        </svg>
        <div style={{marginTop:6,fontSize:13,color:'#8e8e93',textAlign:'center'}}>
          {phase===0&&<>&#9698; Drag cookie A or B anywhere &mdash; the line and triangle update live</>}
          {phase===1&&<>Drag to try more positions, then compute the slope below</>}
          {phase===2&&<>Slide the cookies closer together or further apart along the locked line</>}
        </div>
      </div>

      <LiveReadout/>

      {/* Phase 0: explore then continue */}
      {phase===0&&<div style={{marginTop:18,textAlign:'center'}}>
        {hasDragged
          ?<><p style={{fontSize:15,color:'#636366',marginBottom:12}}>Notice how the line follows both cookies? Try different positions, then continue when ready.</p><button className="nbtn" onClick={()=>setPhase(1)}>I&apos;ve explored &rarr;</button></>
          :<p style={{fontSize:15,color:'#aeaeb2',marginTop:4}}>&#x1F36A; Move a cookie to unlock the next step</p>
        }
      </div>}

      {phase===1&&<div className="qcard fup" style={{marginTop:16,width:'100%',maxWidth:480}}>
        <div style={{fontSize:15,fontWeight:600,color:'#636366',letterSpacing:'.06em',marginBottom:10}}>COMPUTE THE SLOPE</div>
        <p style={{fontSize:16,color:'#1c1c1e',margin:'0 0 14px',display:'flex',alignItems:'center',gap:4,flexWrap:'wrap'}}>Use the &Delta;y and &Delta;x readouts above to calculate <strong style={{display:'inline-flex',alignItems:'center',gap:4}}>m =<Frac n={<>&Delta;y</>} d={<>&Delta;x</>} size={16}/></strong>:</p>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <input value={slopeInput} onChange={e=>setSlopeInput(e.target.value)}
                 onKeyDown={e=>e.key==='Enter'&&checkSlope()}
                 placeholder="e.g. 0.75 or 3/4"
                 style={{border:'1.5px solid '+(slopeGrade==='ok'?'#34c759':slopeGrade==='no'?'#ff3b30':'#d1d1d6'),borderRadius:10,padding:'11px 15px',fontSize:16,fontFamily:'monospace',width:165,outline:'none',background:'#fff',color:'#1c1c1e'}}/>
          <button className="dbtn" onClick={checkSlope} style={{padding:'11px 24px',fontSize:15}}>Check &rarr;</button>
        </div>
        <p style={{fontSize:14,color:'#aeaeb2',marginTop:8}}>Enter a decimal (e.g. 0.5) or fraction (e.g. 1/2 or &minus;2/3).</p>
        {slopeGrade==='no'&&<p style={{marginTop:10,fontSize:16,color:'#ff3b30',lineHeight:1.5}}>Not quite — check the green &Delta;y and blue &Delta;x readouts, then divide.</p>}
        {slopeGrade==='ok'&&<p style={{marginTop:10,fontSize:16,color:'#34c759',fontWeight:600}}>&#x2713; Correct! Locking the line&hellip;</p>}
      </div>}

      {/* Phase 2: constrained slide + two KCs */}
      {phase===2&&<div style={{marginTop:16,width:'100%',maxWidth:580,display:'flex',flexDirection:'column',gap:14}}>
        <div className="icard fup" style={{textAlign:'center',padding:'12px 18px'}}>
          <span style={{fontSize:15,color:'#4338ca'}}>Slide the cookies along the line above, then answer both questions:</span>
        </div>
        <div style={{display:'flex',gap:14,flexWrap:'wrap',justifyContent:'center'}}>
          <div className="qcard fup" style={{flex:'1 1 230px',minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:'#0a84ff',letterSpacing:'.06em',marginBottom:8}}>QUESTION A</div>
            <p style={{fontSize:15,color:'#1c1c1e',margin:'0 0 12px',lineHeight:1.55}}>As you slide the cookies along the line, what happens to <strong style={{color:'#34c759'}}>&Delta;y</strong> and <strong style={{color:'#0a84ff'}}>&Delta;x</strong>?</p>
            {['change','same'].map(opt=>{
              const cor='change';
              let bg='#fff',brd='#e5e5ea',col='#3a3a3c';
              if(qA){if(opt===cor){bg='#e8faf0';brd='#34c759';col='#1c5c35';}else if(qA===opt){bg='#fff4f4';brd='#ff3b30';col='#9b1c1c';}else{col='#aeaeb2';}}
              return<button key={opt} onClick={()=>{if(qA)return;setQA(opt);logEv('se-qa',opt,opt===cor);}} disabled={!!qA}
                style={{display:'block',width:'100%',textAlign:'left',padding:'11px 15px',borderRadius:10,border:'1.5px solid '+brd,background:bg,color:col,fontSize:15,cursor:qA?'default':'pointer',marginBottom:8,transition:'all .15s',fontFamily:'DM Sans,sans-serif'}}>
                {opt==='change'?'They change (grow or shrink)':'They stay the same'}
              </button>;
            })}
            {qA==='same'&&<p style={{fontSize:15,color:'#ff6b35',marginTop:4,lineHeight:1.5}}>Slide the cookies far apart, then close together &mdash; watch the green &Delta;y and blue &Delta;x readouts. Do they change?</p>}
            {qA==='change'&&<p style={{fontSize:15,color:'#34c759',marginTop:4}}>&#x2713; Yes! &Delta;y and &Delta;x grow and shrink as you separate the cookies.</p>}
          </div>
          <div className="qcard fup" style={{flex:'1 1 230px',minWidth:0}}>
            <div style={{fontSize:14,fontWeight:700,color:'#0a84ff',letterSpacing:'.06em',marginBottom:8}}>QUESTION B</div>
            <p style={{fontSize:15,color:'#1c1c1e',margin:'0 0 12px',lineHeight:1.55}}>As you slide the cookies, what happens to the <strong>ratio<Frac n={<>&Delta;y</>} d={<>&Delta;x</>} size={14}/></strong> (the m= readout)?</p>
            {['same','change'].map(opt=>{
              const cor='same';
              let bg='#fff',brd='#e5e5ea',col='#3a3a3c';
              if(qB){if(opt===cor){bg='#e8faf0';brd='#34c759';col='#1c5c35';}else if(qB===opt){bg='#fff4f4';brd='#ff3b30';col='#9b1c1c';}else{col='#aeaeb2';}}
              return<button key={opt} onClick={()=>{if(qB)return;setQB(opt);logEv('se-qb',opt,opt===cor);}} disabled={!!qB}
                style={{display:'block',width:'100%',textAlign:'left',padding:'11px 15px',borderRadius:10,border:'1.5px solid '+brd,background:bg,color:col,fontSize:15,cursor:qB?'default':'pointer',marginBottom:8,transition:'all .15s',fontFamily:'DM Sans,sans-serif'}}>
                {opt==='same'?'It stays the same':'It changes'}
              </button>;
            })}
            {qB==='change'&&<p style={{fontSize:15,color:'#ff6b35',marginTop:4,lineHeight:1.5}}>Watch the &ldquo;m =&rdquo; readout as you slide &mdash; does that number ever change?</p>}
            {qB==='same'&&<p style={{fontSize:15,color:'#34c759',marginTop:4}}>&#x2713; Exactly! The ratio stays constant &mdash; that&apos;s the whole point!</p>}
          </div>
        </div>
        {bothKCsOk&&<p className="fup" style={{fontSize:16,color:'#34c759',textAlign:'center',fontWeight:600,marginTop:4}}>&#x2713; Both correct! Loading key takeaways&hellip;</p>}
      </div>}

      {/* Phase 3: synthesis */}
      {phase===3&&<div style={{marginTop:16,width:'100%',maxWidth:580,display:'flex',flexDirection:'column',gap:14}}>
        <div style={{display:'flex',gap:16,alignItems:'flex-start',background:'#f0f4ff',borderRadius:18,padding:'20px 22px',border:'1.5px solid #c7d2fe'}}>
          <svg viewBox="0 0 150 200" width="56" height="75" style={{flexShrink:0,marginTop:2}}>
